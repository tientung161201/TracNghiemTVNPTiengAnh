{ id: 403, q: "I wish I … speak many languages like her.", o: ["can", "could", "will", "would"], a: "could", ex: "Câu ước ở hiện tại (diễn tả khả năng không có thật): S + wish + S + V2/ed (can -> could).", vn: "Tôi ước mình có thể nói được nhiều ngôn ngữ như cô ấy." },
{ id: 404, q: "If he … more carefully, he wouldn't have had the accident.", o: ["drove", "had driven", "drives", "would drive"], a: "had driven", ex: "Câu điều kiện loại 3, vế If chia ở quá khứ hoàn thành.", vn: "Nếu anh ấy lái xe cẩn thận hơn thì đã không xảy ra tai nạn." },
{ id: 405, q: "I wish it … raining now so that we could go out.", o: ["stops", "stopped", "will stop", "would stop"], a: "stopped", ex: "Câu ước ở hiện tại, động từ lùi về quá khứ đơn.", vn: "Tôi ước trời ngừng mưa ngay lúc này để chúng tôi có thể đi chơi." },
{ id: 406, q: "If they … me, I would have helped them.", o: ["ask", "asked", "had asked", "will ask"], a: "had asked", ex: "Điều kiện loại 3: Giả định một việc không có thật trong quá khứ.", vn: "Nếu họ hỏi tôi thì tôi đã giúp họ rồi." },
{ id: 407, q: "I wish I … that film last night. It was so boring.", o: ["didn't see", "haven't seen", "hadn't seen", "not see"], a: "hadn't seen", ex: "Câu ước cho quá khứ (last night), dùng thì quá khứ hoàn thành dạng phủ định.", vn: "Tôi ước gì tối qua mình đã không xem bộ phim đó. Nó chán quá." },
{ id: 408, q: "If I … his number, I would call him now.", o: ["know", "knew", "had known", "will know"], a: "knew", ex: "Câu điều kiện loại 2: Giả định không có thật ở hiện tại. Vế If dùng quá khứ đơn.", vn: "Nếu tôi biết số của anh ấy, tôi sẽ gọi cho anh ấy ngay bây giờ." },
{ id: 409, q: "I wish you … so much noise. I'm trying to work.", o: ["don't make", "didn't make", "won't make", "wouldn't make"], a: "wouldn't make", ex: "Câu ước thể hiện sự phàn nàn về một thói quen hoặc hành động ở hiện tại: S + wish + S + would/could + V.", vn: "Tôi ước bạn đừng làm ồn như thế. Tôi đang cố gắng làm việc." },
{ id: 410, q: "If she … enough money, she will buy that house.", o: ["has", "had", "had had", "will have"], a: "has", ex: "Câu điều kiện loại 1: Có thể xảy ra ở hiện tại hoặc tương lai. Vế If dùng hiện tại đơn.", vn: "Nếu cô ấy có đủ tiền, cô ấy sẽ mua ngôi nhà đó." },
{ id: 411, q: "She said that she … to go to the cinema with me.", o: ["wants", "wanted", "will want", "has wanted"], a: "wanted", ex: "Câu gián tiếp: Lùi thì từ hiện tại đơn (wants) sang quá khứ đơn (wanted).", vn: "Cô ấy nói rằng cô ấy muốn đi xem phim với tôi." },
{ id: 412, q: "He asked me where I … from.", o: ["come", "came", "am coming", "will come"], a: "came", ex: "Câu hỏi gián tiếp: Lùi thì từ hiện tại đơn sang quá khứ đơn.", vn: "Anh ấy hỏi tôi đến từ đâu." },
{ id: 413, q: "They told us that they … that car the following day.", o: ["will buy", "bought", "would buy", "had bought"], a: "would buy", ex: "Câu gián tiếp: 'will' lùi thành 'would', 'tomorrow' thành 'the following day'.", vn: "Họ bảo chúng tôi rằng họ sẽ mua chiếc xe đó vào ngày hôm sau." },
{ id: 414, q: "My mother asked me … the window.", o: ["close", "closing", "to close", "closed"], a: "to close", ex: "Câu mệnh lệnh gián tiếp: S + asked/told + O + to-V.", vn: "Mẹ tôi bảo tôi đóng cửa sổ lại." },
{ id: 415, q: "The teacher asked the students … noise in class.", o: ["not make", "not to make", "don't make", "to not make"], a: "not to make", ex: "Câu mệnh lệnh phủ định gián tiếp: S + asked/told + O + not + to-V.", vn: "Giáo viên yêu cầu học sinh không làm ồn trong lớp." },
{ id: 416, q: "She said she … that man two days before.", o: ["met", "has met", "had met", "meets"], a: "had met", ex: "Gián tiếp: Quá khứ đơn (met) lùi thành Quá khứ hoàn thành (had met), 'ago' thành 'before'.", vn: "Cô ấy nói rằng cô ấy đã gặp người đàn ông đó 2 ngày trước." },
{ id: 417, q: "He asked me if I … English.", o: ["speak", "spoke", "can speak", "will speak"], a: "spoke", ex: "Câu hỏi Yes/No gián tiếp: S + asked + O + if/whether + S + V(lùi thì).", vn: "Anh ấy hỏi tôi liệu tôi có nói được tiếng Anh không." },
{ id: 418, q: "Lan said she … very busy then.", o: ["is", "was", "has been", "will be"], a: "was", ex: "Gián tiếp: 'is' lùi thành 'was', 'now' thành 'then'.", vn: "Lan nói rằng lúc đó cô ấy đang rất bận." },
{ id: 419, q: "The doctor advised me … smoking.", o: ["give up", "giving up", "to give up", "gave up"], a: "to give up", ex: "Cấu trúc khuyên bảo: advise someone to do something.", vn: "Bác sĩ khuyên tôi nên bỏ thuốc lá." },
{ id: 420, q: "He promised … me the money back the next week.", o: ["pay", "to pay", "paying", "paid"], a: "to pay", ex: "Cấu trúc hứa hẹn: promise to do something.", vn: "Anh ấy hứa sẽ trả lại tiền cho tôi vào tuần tới." },
{ id: 421, q: "I asked him how long … for the bus.", o: ["he has waited", "has he waited", "he had been waiting", "had he been waiting"], a: "he had been waiting", ex: "Câu hỏi gián tiếp: Không đảo ngữ, lùi thì thành quá khứ hoàn thành tiếp diễn.", vn: "Tôi hỏi anh ấy đã đợi xe buýt được bao lâu rồi." },
{ id: 422, q: "She suggested … to the beach for a change.", o: ["go", "to go", "going", "goes"], a: "going", ex: "Cấu trúc gợi ý: suggest + V-ing.", vn: "Cô ấy gợi ý đi ra bãi biển để thay đổi không khí." },
{ id: 423, q: "They denied … the window.", o: ["break", "to break", "breaking", "broken"], a: "breaking", ex: "Cấu trúc phủ nhận: deny + V-ing.", vn: "Họ phủ nhận việc đã làm vỡ cửa sổ." },
{ id: 424, q: "The policeman ordered the man … out of the car.", o: ["get", "to get", "getting", "got"], a: "to get", ex: "Cấu trúc ra lệnh: order someone to do something.", vn: "Cảnh sát ra lệnh cho người đàn ông bước ra khỏi xe." },
{ id: 425, q: "He admitted … the money.", o: ["steal", "to steal", "stealing", "stolen"], a: "stealing", ex: "Cấu trúc thừa nhận: admit + V-ing.", vn: "Anh ta thừa nhận đã lấy trộm tiền." },
{ id: 426, q: "She reminded me … the lights before leaving.", o: ["turn off", "turning off", "to turn off", "turned off"], a: "to turn off", ex: "Cấu trúc nhắc nhở: remind someone to do something.", vn: "Cô ấy nhắc tôi tắt đèn trước khi đi." },
{ id: 427, q: "My father warned me … near the river.", o: ["not go", "not to go", "don't go", "to not go"], a: "not to go", ex: "Cấu trúc cảnh báo: warn someone not to do something.", vn: "Bố tôi cảnh báo tôi không được lại gần con sông." },
{ id: 428, q: "She said that she … for three hours.", o: ["is waiting", "was waiting", "had been waiting", "has been waiting"], a: "had been waiting", ex: "Gián tiếp: Quá khứ tiếp diễn hoặc Hiện tại hoàn thành tiếp diễn lùi về Quá khứ hoàn thành tiếp diễn.", vn: "Cô ấy nói rằng cô ấy đã đợi được 3 tiếng đồng hồ rồi." },
{ id: 429, q: "He asked me … I had seen his keys.", o: ["that", "if", "what", "which"], a: "if", ex: "Câu hỏi Yes/No gián tiếp dùng 'if' hoặc 'whether'.", vn: "Anh ấy hỏi tôi liệu tôi có nhìn thấy chìa khóa của anh ấy không." },
{ id: 430, q: "They said they … to HCMC the previous year.", o: ["move", "moved", "had moved", "have moved"], a: "had moved", ex: "Gián tiếp: 'last year' lùi thành 'the previous year', động từ lùi về Quá khứ hoàn thành.", vn: "Họ nói rằng họ đã chuyển đến TP.HCM vào năm trước." },
{ id: 431, q: "I enjoy … to music in my free time.", o: ["listen", "to listen", "listening", "listened"], a: "listening", ex: "Sau 'enjoy' là danh động từ (V-ing).", vn: "Tôi thích nghe nhạc vào thời gian rảnh rỗi." },
{ id: 432, q: "They decided … to the cinema together.", o: ["go", "to go", "going", "went"], a: "to go", ex: "Sau 'decide' là động từ nguyên mẫu có 'to'.", vn: "Họ quyết định đi xem phim cùng nhau." },
{ id: 433, q: "He avoids … to crowded places.", o: ["go", "to go", "going", "goes"], a: "going", ex: "Sau 'avoid' (tránh) dùng V-ing.", vn: "Anh ấy tránh đi đến những nơi đông người." },
{ id: 434, q: "We hope … you again soon.", o: ["see", "seeing", "to see", "saw"], a: "to see", ex: "Sau 'hope' dùng To-V.", vn: "Chúng tôi hy vọng sớm gặp lại bạn." },
{ id: 435, q: "She finished … her homework at 10 p.m.", o: ["do", "doing", "to do", "did"], a: "doing", ex: "Sau 'finish' dùng V-ing.", vn: "Cô ấy hoàn thành bài tập về nhà lúc 10 giờ tối." },
{ id: 436, q: "They refused … the rules of the company.", o: ["follow", "following", "to follow", "followed"], a: "to follow", ex: "Sau 'refuse' (từ chối) dùng To-V.", vn: "Họ từ chối tuân theo các quy định của công ty." },
{ id: 437, q: "It's no use … about the past.", o: ["cry", "crying", "to cry", "cried"], a: "crying", ex: "Cấu trúc: It's no use + V-ing (Chẳng ích gì khi làm gì).", vn: "Chẳng ích gì khi cứ than vãn về quá khứ." },
{ id: 438, q: "He is interested in … stamps.", o: ["collect", "collecting", "to collect", "collected"], a: "collecting", ex: "Sau giới từ (in) dùng V-ing.", vn: "Anh ấy quan tâm đến việc sưu tầm tem." },
{ id: 439, q: "She is afraid of … out alone at night.", o: ["go", "going", "to go", "gone"], a: "going", ex: "Sau giới từ (of) dùng V-ing.", vn: "Cô ấy sợ đi ra ngoài một mình vào ban đêm." },
{ id: 440, q: "Would you mind … the door for me?", o: ["open", "opening", "to open", "opened"], a: "opening", ex: "Cấu trúc: Would you mind + V-ing?", vn: "Bạn có phiền mở cửa giúp tôi không?" },
{ id: 441, q: "He spent all morning … his old car.", o: ["repair", "repairing", "to repair", "repaired"], a: "repairing", ex: "Cấu trúc: Spend + time + V-ing.", vn: "Anh ấy dành cả buổi sáng để sửa chiếc xe cũ của mình." },
{ id: 442, q: "I'm looking forward to … from you soon.", o: ["hear", "hearing", "to hear", "heard"], a: "hearing", ex: "Cấu trúc: Look forward to + V-ing (Mong đợi làm gì).", vn: "Tôi rất mong sớm nhận được tin từ bạn." },
{ id: 443, q: "The teacher made the students … the essay again.", o: ["write", "writing", "to write", "wrote"], a: "write", ex: "Cấu trúc: Make + O + V (bare-inf).", vn: "Giáo viên bắt học sinh viết lại bài luận." },
{ id: 444, q: "He let his children … out late on weekends.", o: ["stay", "to stay", "staying", "stayed"], a: "stay", ex: "Cấu trúc: Let + O + V (bare-inf).", vn: "Anh ấy cho phép con mình đi chơi khuya vào cuối tuần." },
{ id: 445, q: "I'd rather … at home than go out tonight.", o: ["stay", "to stay", "staying", "stayed"], a: "stay", ex: "Cấu trúc: Would rather + V (bare-inf).", vn: "Tôi thà ở nhà còn hơn đi chơi tối nay." },
{ id: 446, q: "You'd better … to the doctor.", o: ["go", "to go", "going", "went"], a: "go", ex: "Cấu trúc: Had better + V (bare-inf) (Nên làm gì).", vn: "Bạn nên đi gặp bác sĩ đi." },
{ id: 447, q: "We can't help … when we see that funny cat.", o: ["laugh", "laughing", "to laugh", "laughed"], a: "laughing", ex: "Cấu trúc: Can't help + V-ing (Không thể nhịn được cười).", vn: "Chúng tôi không thể nhịn cười khi thấy con mèo buồn cười đó." },
{ id: 448, q: "He denied … the money from the safe.", o: ["take", "taking", "to take", "taken"], a: "taking", ex: "Sau 'deny' dùng V-ing.", vn: "Anh ta phủ nhận việc lấy tiền từ trong két sắt." },
{ id: 449, q: "I remember … the door, but I can't find my keys now.", o: ["lock", "locking", "to lock", "locked"], a: "locking", ex: "Remember + V-ing: Nhớ một việc đã làm trong quá khứ.", vn: "Tôi nhớ là đã khóa cửa rồi, nhưng giờ không tìm thấy chìa khóa đâu." },
{ id: 450, q: "Please remember … the door before you leave.", o: ["lock", "locking", "to lock", "locked"], a: "to lock", ex: "Remember + To-V: Nhớ phải làm một việc gì đó (trong tương lai/nhiệm vụ).", vn: "Làm ơn hãy nhớ khóa cửa trước khi bạn rời đi." },
{ id: 451, q: "I'll never forget … her for the first time.", o: ["meet", "meeting", "to meet", "met"], a: "meeting", ex: "Forget + V-ing: Quên một việc đã làm trong quá khứ.", vn: "Tôi sẽ không bao giờ quên lần đầu tiên gặp cô ấy." },
{ id: 452, q: "Don't forget … the letters on your way home.", o: ["post", "posting", "to post", "posted"], a: "to post", ex: "Forget + To-V: Quên phải làm việc gì đó.", vn: "Đừng quên gửi những lá thư này trên đường về nhà nhé." },
{ id: 453, q: "He stopped … to talk to his friend.", o: ["walk", "walking", "to walk", "walked"], a: "walking", ex: "Stop + V-ing: Dừng hẳn hành động đang làm (dừng việc đi bộ).", vn: "Anh ấy dừng việc đi bộ để nói chuyện với bạn." },
{ id: 454, q: "He stopped … a cigarette.", o: ["smoke", "smoking", "to smoke", "smoked"], a: "to smoke", ex: "Stop + To-V: Dừng một việc để làm việc khác (dừng lại để hút thuốc).", vn: "Anh ấy dừng lại để hút một điếu thuốc." },
{ id: 455, q: "My house needs … .", o: ["paint", "painting", "to paint", "painted"], a: "painting", ex: "Need + V-ing: Mang nghĩa bị động (Cái gì cần được làm).", vn: "Ngôi nhà của tôi cần được sơn lại." },
{ id: 456, q: "I need … my homework now.", o: ["do", "doing", "to do", "did"], a: "to do", ex: "Need + To-V: Mang nghĩa chủ động (Ai cần làm gì).", vn: "Tôi cần phải làm bài tập về nhà bây giờ." },
{ id: 457, q: "The children are busy … for the festival.", o: ["prepare", "preparing", "to prepare", "prepared"], a: "preparing", ex: "Cấu trúc: Be busy + V-ing.", vn: "Lũ trẻ đang bận rộn chuẩn bị cho lễ hội." },
{ id: 458, q: "It's worth … that book.", o: ["read", "reading", "to read", "readed"], a: "reading", ex: "Cấu trúc: Be worth + V-ing (Đáng để làm gì).", vn: "Cuốn sách đó rất đáng để đọc." },
{ id: 459, q: "I don't feel like … out tonight.", o: ["go", "going", "to go", "gone"], a: "going", ex: "Cấu trúc: Feel like + V-ing (Thấy thích/muốn làm gì).", vn: "Tôi không thấy muốn đi chơi tối nay." },
{ id: 460, q: "He managed … the heavy box alone.", o: ["lift", "lifting", "to lift", "lifted"], a: "to lift", ex: "Sau 'manage' dùng To-V (xoay xở làm được việc gì).", vn: "Anh ấy đã xoay xở tự nâng được chiếc hộp nặng đó." },
{ id: 461, q: "The boys are used to … football in the afternoon.", o: ["play", "playing", "to play", "played"], a: "playing", ex: "Cấu trúc: Be used to + V-ing (Quen với việc làm gì).", vn: "Những cậu bé đã quen với việc chơi bóng đá vào buổi chiều." },
{ id: 462, q: "I used to … swimming when I was a child.", o: ["go", "going", "to go", "went"], a: "go", ex: "Cấu trúc: Used to + V (bare) (Từng làm gì trong quá khứ).", vn: "Tôi từng hay đi bơi khi còn là một đứa trẻ." },
{ id: 463, q: "She has difficulty … English.", o: ["speak", "speaking", "to speak", "spoke"], a: "speaking", ex: "Cấu trúc: Have difficulty (in) + V-ing.", vn: "Cô ấy gặp khó khăn trong việc nói tiếng Anh." },
{ id: 464, q: "They waste a lot of time … video games.", o: ["play", "playing", "to play", "played"], a: "playing", ex: "Cấu trúc: Waste + time + V-ing.", vn: "Họ lãng phí rất nhiều thời gian chơi trò chơi điện tử." },
{ id: 465, q: "I prefer … to staying at home.", o: ["travel", "traveling", "to travel", "traveled"], a: "traveling", ex: "Cấu trúc: Prefer + V-ing + to + V-ing.", vn: "Tôi thích đi du lịch hơn là ở nhà." },
{ id: 466, q: "It's time for us … .", o: ["leave", "leaving", "to leave", "left"], a: "to leave", ex: "Cấu trúc: It's time (for someone) + to-V.", vn: "Đã đến lúc chúng ta phải đi rồi." },
{ id: 467, q: "We were surprised … the news.", o: ["hear", "hearing", "to hear", "heard"], a: "to hear", ex: "Sau tính từ chỉ cảm xúc (surprised) dùng To-V.", vn: "Chúng tôi đã ngạc nhiên khi nghe tin tức đó." },
{ id: 468, q: "He is too young … that car.", o: ["drive", "driving", "to drive", "drove"], a: "to drive", ex: "Cấu trúc: Too + adj + to-V.", vn: "Cậu ấy còn quá trẻ để lái chiếc xe đó." },
{ id: 469, q: "The water is hot enough … tea.", o: ["make", "making", "to make", "made"], a: "to make", ex: "Cấu trúc: Adj + enough + to-V.", vn: "Nước đủ nóng để pha trà." },
{ id: 470, q: "I saw her … across the street.", o: ["run", "to run", "ran", "runs"], a: "run", ex: "Cấu trúc: See + O + V (bare) (Thấy toàn bộ hành động).", vn: "Tôi thấy cô ấy chạy băng qua đường." },
{ id: 471, q: "You … smoke here. It's against the law.", o: ["don't have to", "mustn't", "needn't", "might not"], a: "mustn't", ex: "Dùng 'mustn't' để chỉ sự cấm đoán.", vn: "Bạn không được phép hút thuốc ở đây. Đó là phạm luật." },
{ id: 472, q: "Tomorrow is Sunday, so I … get up early.", o: ["mustn't", "don't have to", "can't", "shouldn't"], a: "don't have to", ex: "Dùng 'don't have to' để chỉ sự không cần thiết.", vn: "Ngày mai là Chủ nhật nên tôi không cần phải dậy sớm." },
{ id: 473, q: "He … be at home. I saw his car in the garage.", o: ["must", "can", "might", "should"], a: "must", ex: "Dùng 'must' để đưa ra dự đoán chắc chắn ở hiện tại.", vn: "Anh ấy chắc chắn đang ở nhà. Tôi thấy xe của anh ấy trong gara." },
{ id: 474, q: "You … brush your teeth twice a day.", o: ["must", "can", "should", "might"], a: "should", ex: "Dùng 'should' để đưa ra lời khuyên.", vn: "Bạn nên đánh răng hai lần một ngày." },
{ id: 475, q: "I … swim when I was five years old.", o: ["can", "could", "must", "might"], a: "could", ex: "Dùng 'could' để chỉ khả năng trong quá khứ.", vn: "Tôi đã có thể bơi khi tôi mới 5 tuổi." },
{ id: 476, q: "It's cloudy. It … rain later.", o: ["must", "might", "should", "will"], a: "might", ex: "Dùng 'might' để chỉ một khả năng có thể xảy ra (không chắc chắn).", vn: "Trời nhiều mây. Có lẽ lát nữa sẽ mưa." },

{ id: 558, q: "She speaks … French fluently.", o: ["a", "an", "the", "∅"], a: "∅", ex: "Không dùng mạo từ trước tên các ngôn ngữ.", vn: "Cô ấy nói tiếng Pháp trôi chảy." },
{ id: 559, q: "… Himalayas are the highest mountains in the world.", o: ["A", "An", "The", "∅"], a: "The", ex: "Dùng 'the' trước tên các dãy núi.", vn: "Dãy Himalaya là những ngọn núi cao nhất thế giới." },
{ id: 560, q: "Mount Everest is in … Nepal.", o: ["a", "an", "the", "∅"], a: "∅", ex: "Không dùng mạo từ trước tên các đỉnh núi đơn lẻ hoặc tên quốc gia (số ít).", vn: "Đỉnh Everest nằm ở Nepal." },
{ id: 561, q: "… Nile is the longest river in the world.", o: ["A", "An", "The", "∅"], a: "The", ex: "Dùng 'the' trước tên các con sông.", vn: "Sông Nile là con sông dài nhất thế giới." },
{ id: 562, q: "They crossed … Atlantic Ocean in two weeks.", o: ["a", "an", "the", "∅"], a: "the", ex: "Dùng 'the' trước tên các đại dương.", vn: "Họ đã băng qua Đại Tây Dương trong hai tuần." },
{ id: 563, q: "We visited … Lake Geneva last summer.", o: ["a", "an", "the", "∅"], a: "∅", ex: "Không dùng mạo từ trước tên các hồ có chữ 'Lake' đi kèm.", vn: "Chúng tôi đã đến thăm hồ Geneva vào mùa hè năm ngoái." },
{ id: 564, q: "This is … best book I've ever read.", o: ["a", "an", "the", "∅"], a: "the", ex: "Dùng 'the' trước so sánh nhất.", vn: "Đây là cuốn sách hay nhất tôi từng đọc." },
{ id: 565, q: "Eggs are sold by … dozen.", o: ["a", "an", "the", "∅"], a: "the", ex: "Dùng 'the' trong cụm từ đo lường 'by the + đơn vị'.", vn: "Trứng được bán theo tá." },
{ id: 566, q: "Please sit on … floor.", o: ["a", "an", "the", "∅"], a: "the", ex: "Dùng 'the' cho những vật xác định trong ngữ cảnh (cái sàn nhà này).", vn: "Làm ơn hãy ngồi xuống sàn." },
{ id: 567, q: "… telephone was invented by Alexander Graham Bell.", o: ["A", "An", "The", "∅"], a: "The", ex: "Dùng 'the' trước các phát minh.", vn: "Điện thoại được phát minh bởi Alexander Graham Bell." },
{ id: 568, q: "… happiness is important for everyone.", o: ["A", "An", "The", "∅"], a: "∅", ex: "Không dùng mạo từ trước danh từ trừu tượng nói chung.", vn: "Hạnh phúc quan trọng đối với tất cả mọi người." },
{ id: 569, q: "We should help … poor.", o: ["a", "an", "the", "∅"], a: "the", ex: "Dùng 'the + adj' để chỉ một nhóm người.", vn: "Chúng ta nên giúp đỡ người nghèo." },
{ id: 570, q: "He likes playing … football.", o: ["a", "an", "the", "∅"], a: "∅", ex: "Không dùng mạo từ trước tên các môn thể thao.", vn: "Anh ấy thích chơi bóng đá." },
{ id: 571, q: "If I … you, I would take that job.", o: ["am", "was", "were", "had been"], a: "were", ex: "Câu điều kiện loại 2, giả định không có thật ở hiện tại.", vn: "Nếu tôi là bạn, tôi sẽ nhận công việc đó." },
{ id: 572, q: "She has been working here … 2010.", o: ["for", "since", "during", "in"], a: "since", ex: "Dùng 'since' cộng với mốc thời gian trong thì hiện tại hoàn thành.", vn: "Cô ấy đã làm việc ở đây từ năm 2010." },
{ id: 573, q: "The movie … we saw last night was very exciting.", o: ["who", "whom", "which", "whose"], a: "which", ex: "Đại từ quan hệ 'which' thay thế cho vật (The movie).", vn: "Bộ phim chúng tôi xem tối qua rất thú vị." },
{ id: 574, q: "You … better go to see a doctor.", o: ["had", "would", "should", "ought"], a: "had", ex: "Cấu trúc: Had better + V-bare (Nên làm gì).", vn: "Bạn nên đi gặp bác sĩ đi." },
{ id: 575, q: "By the time he arrived, the meeting … .", o: ["finished", "has finished", "had finished", "was finishing"], a: "had finished", ex: "Hành động hoàn thành trước một thời điểm/hành động khác trong quá khứ.", vn: "Đến lúc anh ấy đến thì cuộc họp đã kết thúc rồi." },
{ id: 576, q: "I don't mind … for you.", o: ["wait", "waiting", "to wait", "waited"], a: "waiting", ex: "Sau 'mind' là V-ing.", vn: "Tôi không phiền khi phải đợi bạn." },
{ id: 577, q: "She is the woman … son won the first prize.", o: ["who", "whom", "which", "whose"], a: "whose", ex: "Đại từ quan hệ 'whose' chỉ sở hữu.", vn: "Cô ấy là người phụ nữ có con trai đạt giải nhất." },
{ id: 578, q: "He suggested … a picnic this weekend.", o: ["have", "having", "to have", "had"], a: "having", ex: "Sau 'suggest' là V-ing.", vn: "Anh ấy gợi ý tổ chức một buổi dã ngoại vào cuối tuần này." },
{ id: 579, q: "The car was … expensive for me to buy.", o: ["too", "so", "such", "enough"], a: "too", ex: "Cấu trúc: Too + adj + (for someone) + to-V.", vn: "Chiếc xe quá đắt để tôi có thể mua." },
{ id: 580, q: "Neither my parents … my brother can come.", o: ["or", "nor", "and", "but"], a: "nor", ex: "Cấu trúc: Neither... nor... (Không... cũng không).", vn: "Cả bố mẹ và anh trai tôi đều không thể đến." },
{ id: 581, q: "He speaks English … than I do.", o: ["good", "well", "better", "best"], a: "better", ex: "So sánh hơn của trạng từ 'well' là 'better'.", vn: "Anh ấy nói tiếng Anh giỏi hơn tôi." },
{ id: 582, q: "I haven't seen her … a long time.", o: ["since", "for", "during", "in"], a: "for", ex: "Dùng 'for' cộng với khoảng thời gian.", vn: "Tôi đã không gặp cô ấy trong một thời gian dài." },
{ id: 583, q: "The children were … noise that I couldn't sleep.", o: ["making such a", "making so", "so making", "such making"], a: "making such a", ex: "Cấu trúc: Such + a/an + adj + N + that.", vn: "Lũ trẻ làm ồn đến mức tôi không thể ngủ được." },
{ id: 584, q: "You must … your homework before going out.", o: ["finish", "to finish", "finishing", "finished"], a: "finish", ex: "Sau động từ khuyết thiếu 'must' là V-bare.", vn: "Bạn phải hoàn thành bài tập về nhà trước khi đi chơi." },
{ id: 585, q: "He asked me … I liked pop music.", o: ["that", "if", "what", "which"], a: "if", ex: "Câu hỏi Yes/No gián tiếp dùng 'if' hoặc 'whether'.", vn: "Anh ấy hỏi tôi liệu tôi có thích nhạc pop không." },
{ id: 586, q: "It's a beautiful day, … ?", o: ["is it", "isn't it", "was it", "wasn't it"], a: "isn't it", ex: "Câu hỏi đuôi cho mệnh đề khẳng định dùng to be 'is'.", vn: "Hôm nay là một ngày đẹp trời, phải không?" },
{ id: 587, q: "I wish I … more money now.", o: ["have", "had", "has", "having"], a: "had", ex: "Câu ước cho hiện tại, lùi thì về quá khứ đơn.", vn: "Tôi ước gì mình có nhiều tiền hơn ngay bây giờ." },
{ id: 588, q: "She is very … in collecting old coins.", o: ["interest", "interested", "interesting", "interestingly"], a: "interested", ex: "Tính từ đuôi -ed chỉ cảm xúc của con người.", vn: "Cô ấy rất quan tâm đến việc sưu tầm tiền xu cổ." },
{ id: 589, q: "This is the place … I first met my wife.", o: ["which", "where", "when", "that"], a: "where", ex: "Đại từ quan hệ chỉ nơi chốn.", vn: "Đây là nơi tôi lần đầu gặp vợ mình." },
{ id: 590, q: "The house … 100 years ago.", o: ["built", "was built", "was build", "has been built"], a: "was built", ex: "Câu bị động ở thì quá khứ đơn.", vn: "Ngôi nhà này được xây dựng cách đây 100 năm." },
{ id: 591, q: "Although it was raining, … we went to the football match.", o: ["but", "so", "∅", "however"], a: "∅", ex: "Mệnh đề 'Although' không dùng 'but'.", vn: "Mặc dù trời đang mưa nhưng chúng tôi vẫn đi xem trận bóng đá." },
{ id: 592, q: "He drives … than he used to.", o: ["careful", "more careful", "carefully", "more carefully"], a: "more carefully", ex: "So sánh hơn của trạng từ 'carefully'.", vn: "Anh ấy lái xe cẩn thận hơn trước đây." },
{ id: 593, q: "I'll call you as soon as I … home.", o: ["get", "will get", "got", "am getting"], a: "get", ex: "Trong mệnh đề thời gian chỉ tương lai, dùng thì hiện tại đơn.", vn: "Tôi sẽ gọi cho bạn ngay khi tôi về đến nhà." },
{ id: 594, q: "She told me … anyone the secret.", o: ["not tell", "not to tell", "don't tell", "to not tell"], a: "not to tell", ex: "Câu mệnh lệnh gián tiếp phủ định: not + to-V.", vn: "Cô ấy bảo tôi không được nói bí mật này với bất kỳ ai." },
{ id: 595, q: "The exam was … than we expected.", o: ["easy", "easier", "more easy", "easiest"], a: "easier", ex: "So sánh hơn của tính từ ngắn 'easy'.", vn: "Kỳ thi dễ hơn chúng tôi mong đợi." },
{ id: 596, q: "If it … tomorrow, we will cancel the trip.", o: ["rains", "rained", "will rain", "has rained"], a: "rains", ex: "Câu điều kiện loại 1.", vn: "Nếu ngày mai trời mưa, chúng tôi sẽ hủy chuyến đi." },
{ id: 597, q: "He is … man I've ever met.", o: ["the most intelligent", "more intelligent", "most intelligent", "the more intelligent"], a: "the most intelligent", ex: "So sánh nhất với tính từ dài.", vn: "Anh ấy là người đàn ông thông minh nhất tôi từng gặp." },
{ id: 598, q: "I enjoy … to the radio in the morning.", o: ["listen", "listening", "to listen", "listened"], a: "listening", ex: "Sau 'enjoy' dùng V-ing.", vn: "Tôi thích nghe đài vào buổi sáng." },
{ id: 599, q: "He … go to school yesterday because he was sick.", o: ["didn't", "doesn't", "hasn't", "won't"], a: "didn't", ex: "Phủ định thì quá khứ đơn (yesterday).", vn: "Hôm qua anh ấy không đi học vì bị ốm." },
{ id: 600, q: "They have lived in this house … five years.", o: ["since", "for", "during", "in"], a: "for", ex: "Dùng 'for' với khoảng thời gian.", vn: "Họ đã sống trong ngôi nhà này được 5 năm." },
{ id: 601, q: "I’ll lend you the money … you pay me back next week.", o: ["provided that", "unless", "although", "because"], a: "provided that", ex: "Provided that: với điều kiện là/miễn là.", vn: "Tôi sẽ cho bạn mượn tiền với điều kiện là bạn trả lại tôi vào tuần tới." },
{ id: 602, q: "You won't pass the exam … you study harder.", o: ["unless", "if", "because", "although"], a: "unless", ex: "Unless = If not: Trừ khi.", vn: "Bạn sẽ không đỗ kỳ thi trừ khi bạn học tập chăm chỉ hơn." },
{ id: 603, q: "He is … intelligent … everyone admires him.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "so / that", ex: "Cấu trúc: So + adj + that (quá... đến nỗi mà).", vn: "Anh ấy thông minh đến nỗi mọi người đều ngưỡng mộ." },
{ id: 604, q: "It was … a cold day … we stayed indoors.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "such / that", ex: "Cấu trúc: Such + a/an + adj + N + that.", vn: "Đó là một ngày lạnh đến nỗi chúng tôi chỉ ở trong nhà." },
{ id: 605, q: "She speaks English … well … I thought she was American.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "so / that", ex: "Cấu trúc: So + adv + that.", vn: "Cô ấy nói tiếng Anh giỏi đến nỗi tôi cứ ngỡ cô ấy là người Mỹ." },
{ id: 606, q: "I have … many things to do … I can't go out with you.", o: ["so", "such", "too", "very"], a: "so", ex: "So + many/much + N + that.", vn: "Tôi có nhiều việc phải làm đến nỗi không thể đi chơi với bạn." },
{ id: 607, q: "Neither Lan … her friends are going to the party.", o: ["or", "nor", "and", "but"], a: "nor", ex: "Cấu trúc: Neither... nor... (không... cũng không).", vn: "Cả Lan và bạn của cô ấy đều không đi dự tiệc." },
{ id: 608, q: "Either you … your brother has to wash the dishes.", o: ["or", "nor", "and", "but"], a: "or", ex: "Cấu trúc: Either... or... (hoặc... hoặc).", vn: "Hoặc là bạn hoặc là anh trai bạn phải rửa bát." },
{ id: 609, q: "Both my father … my mother are doctors.", o: ["or", "nor", "and", "but"], a: "and", ex: "Cấu trúc: Both... and... (cả... và).", vn: "Cả bố và mẹ tôi đều là bác sĩ." },
{ id: 610, q: "Not only is he handsome … he is also very kind.", o: ["but", "and", "or", "nor"], a: "but", ex: "Cấu trúc: Not only... but also... (không những... mà còn).", vn: "Anh ấy không những đẹp trai mà còn rất tốt bụng." },
{ id: 611, q: "I don't know … to go or to stay.", o: ["whether", "if", "that", "why"], a: "whether", ex: "Cấu trúc: Whether... or... (liệu... hay).", vn: "Tôi không biết nên đi hay ở lại." },
{ id: 612, q: "He is … old … he can't walk without a stick.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "so / that", ex: "Cấu trúc: So + adj + that.", vn: "Ông ấy già đến nỗi không thể đi lại mà không có gậy." },
{ id: 613, q: "The mountain was … high … we couldn't climb it.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "so / that", ex: "Cấu trúc: So + adj + that.", vn: "Ngọn núi quá cao đến nỗi chúng tôi không thể leo lên được." },
{ id: 614, q: "It was … a beautiful sunset … we stopped to watch.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "such / that", ex: "Cấu trúc: Such + a/an + adj + N + that.", vn: "Đó là một buổi hoàng hôn đẹp đến nỗi chúng tôi đã dừng lại để xem." },
{ id: 615, q: "I was … tired … I fell asleep immediately.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "so / that", ex: "Cấu trúc: So + adj + that.", vn: "Tôi mệt đến nỗi đã ngủ thiếp đi ngay lập tức." },
{ id: 616, q: "He has … little money … he can't buy a car.", o: ["so", "such", "too", "very"], a: "so", ex: "So + little/few + N + that.", vn: "Anh ấy có ít tiền đến nỗi không thể mua được ô tô." },

{ id: 618, q: "The water is … hot … you can't drink it.", o: ["so / that", "too / to", "such / that", "enough / to"], a: "so / that", ex: "Cấu trúc: So + adj + that.", vn: "Nước nóng đến nỗi bạn không thể uống được." },
{ id: 619, q: "He is … young … he can't drive a car.", o: ["so / that", "too / to", "such / that", "enough / to"], a: "so / that", ex: "Cấu trúc: So + adj + that.", vn: "Cậu ấy trẻ đến nỗi chưa thể lái ô tô." },
{ id: 620, q: "It was … a difficult test … no one passed.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "such / that", ex: "Cấu trúc: Such + a/an + adj + N + that.", vn: "Đó là một bài kiểm tra khó đến nỗi không ai vượt qua." },

{ id: 622, q: "She is … a kind person … everyone likes her.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "such / that", ex: "Cấu trúc: Such + a/an + adj + N + that.", vn: "Cô ấy là một người tốt đến nỗi ai cũng yêu quý." },
{ id: 623, q: "There were … few people … the meeting was cancelled.", o: ["so", "such", "too", "very"], a: "so", ex: "So + few + N + that.", vn: "Có ít người đến nỗi cuộc họp đã bị hủy." },

{ id: 626, q: "I have … many books … I need a new bookshelf.", o: ["so", "such", "too", "very"], a: "so", ex: "So + many + N + that.", vn: "Tôi có nhiều sách đến nỗi cần một cái kệ mới." },

{ id: 628, q: "It was … a loud noise … I jumped.", o: ["so / that", "such / that", "too / to", "enough / to"], a: "such / that", ex: "Cấu trúc: Such + a/an + adj + N + that.", vn: "Đó là một tiếng động lớn đến nỗi tôi đã giật mình." },

{ id: 630, q: "There is … much noise … I can't concentrate.", o: ["so", "such", "too", "very"], a: "so", ex: "So + much + N + that.", vn: "Có quá nhiều tiếng ồn đến nỗi tôi không thể tập trung." },

{ id: 632, q: "I don't have … money in my pocket.", o: ["some", "any", "many", "much"], a: "any", ex: "Dùng 'any' trong câu phủ định.", vn: "Tôi không có đồng nào trong túi cả." },

        document.getElementById('nextSlide').onclick = () => {
            if (currentSlideIdx < activeGroup.slides.length - 1) { currentSlideIdx++; updateSlide(); }
            else { document.getElementById('theory-area').style.display = 'none'; startQuizNow(); }
        };
        document.getElementById('prevSlide').onclick = () => { if (currentSlideIdx > 0) { currentSlideIdx--; updateSlide(); } };

        function startQuizNow() {
            currentQuestions = allQuestions.filter(q => {
                for(let i=0; i<activeGroup.range.length; i+=2) {
                    if(q.id >= activeGroup.range[i] && q.id <= activeGroup.range[i+1]) return true;
                }
                return false;
            });
            render();
            document.getElementById('viewScoreButton').style.display = 'inline-block';
        }

        document.getElementById('btnStartQuiz').onclick = () => {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('timerDisplay').style.display = 'block';
            document.getElementById('headerTitle').innerText = "THI THỬ";
            let selected = [];
            questionGroups.forEach(g => {
                const pool = allQuestions.filter(q => {
                    for(let i=0; i<g.range.length; i+=2) {
                        if(q.id >= g.range[i] && q.id <= g.range[i+1]) return true;
                    }
                    return false;
                });
                if(pool.length > 0) selected.push(pool[Math.floor(Math.random()*pool.length)]);
            });
            const remaining = allQuestions.filter(q => !selected.includes(q));
            while(selected.length < 20) {
                if(remaining.length === 0) break;
                selected.push(remaining.splice(Math.floor(Math.random()*remaining.length), 1)[0]);
            }
            currentQuestions = selected.sort(() => Math.random() - 0.5);
            render();
            startTimer(10);
            document.getElementById('viewScoreButton').style.display = 'inline-block';
        };

        function render() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = ''; score = 0;
            currentQuestions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `
                    <div class="question-text">Câu ${i + 1}: ${q.q}</div>
                    <div id="opts-${i}"></div>
                    <div class="explanation-box" id="ex-${i}">
                        <div class="ex-header">Hệ thống phân tích</div>
                        <div style="line-height:1.6; opacity:0.9;">${q.ex}</div>
                        <div class="ex-vn">Dịch: ${q.vn}</div>
                    </div>
                `;
                area.appendChild(card);
                const opts = document.getElementById(`opts-${i}`);
                q.o.forEach(txt => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.innerText = txt;
                    div.onclick = () => {
                        if(opts.classList.contains('done')) return;
                        opts.classList.add('done');
                        if(txt === q.a) { div.classList.add('correct'); score++; }
                        else { 
                            div.classList.add('incorrect');
                            Array.from(opts.children).forEach(c => { if(c.innerText === q.a) c.classList.add('correct'); });
                        }
                        Array.from(opts.children).forEach(c => c.classList.add('disabled'));
                        document.getElementById(`ex-${i}`).style.display = 'block';
                    };
                    opts.appendChild(div);
                });
            });
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function startTimer(min) {
            let s = min * 60;
            timerInterval = setInterval(() => {
                let m = Math.floor(s/60); let sec = s%60;
                document.getElementById('timerDisplay').innerText = `${m}:${sec<10?'0'+sec:sec}`;
                if(s-- <= 0) { clearInterval(timerInterval); finish(); }
            }, 1000);
        }

        function finish() {
            clearInterval(timerInterval);
            document.getElementById('scoreDisplay').innerText = `${score}/${currentQuestions.length}`;
            document.getElementById('resultsPopup').style.display = 'flex';
        }

        document.getElementById('viewScoreButton').onclick = finish;
    </script>
</body>
</html>
