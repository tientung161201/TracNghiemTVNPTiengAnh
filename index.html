<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TỪ VỰNG NGỮ PHÁP</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/jjypr8hR/Logo-MTA-new.png">

    <style>
        /* IMPORT PHÔNG CHỮ GOOGLE */
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;700&family=Montserrat:wght@700;900&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-neon: #00f2ff;
            --correct-glow: #00ff88;
            --incorrect-glow: #ff3d71;
            --text-main: #ffffff;
            --font-main: 'Be Vietnam Pro', sans-serif;
            --font-head: 'Montserrat', sans-serif;
            --shadow-3d: 0 30px 60px rgba(0, 0, 0, 0.6), 
                         inset 0 1px 2px rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(88, 28, 135, 0.4) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(15, 23, 42, 1) 0px, transparent 80%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-top: 110px;
            overflow-x: hidden;
            zoom: 0.9; 
            -moz-transform: scale(0.9);
            -moz-transform-origin: top center;
        }

        /* HEADER */
        .header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 1100px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px; padding: 12px 35px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.4);
        }

        .logo { 
            font-family: var(--font-head); font-weight: 900; font-size: 1.3rem; 
            color: var(--accent-neon); text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); 
            text-transform: uppercase; letter-spacing: 2px;
        }

        #timerDisplay {
            font-family: var(--font-head); font-size: 1.4rem;
            color: var(--incorrect-glow); text-shadow: 0 0 20px var(--incorrect-glow);
            display: none; font-weight: 700;
        }

        .container { max-width: 950px; margin: 0 auto; padding: 0 20px 80px 20px; }

        /* GLASS CARD */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(45px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 40px; padding: 45px; margin-bottom: 35px;
            position: relative; overflow: hidden;
            box-shadow: var(--shadow-3d);
        }

        /* TRANG CHỦ: SUBJECT GRID */
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .subject-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px; border-radius: 25px; text-align: center;
            cursor: pointer; transition: 0.4s;
        }
        .subject-item:hover { 
            background: rgba(255,255,255,0.08); 
            border-color: var(--accent-neon);
            box-shadow: 0 15px 35px rgba(0, 242, 255, 0.2);
            transform: translateY(-8px);
        }

        /* MOCK TEST HERO */
        .mock-test-hero {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(255, 61, 113, 0.15), rgba(0, 242, 255, 0.15));
            border: 1px solid var(--incorrect-glow);
            padding: 35px; border-radius: 35px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.4s; margin-bottom: 10px;
        }

        /* SLIDE AREA V5.0 */
        #theory-area { display: none; }
        .slide-content { 
            font-size: 1.25rem; line-height: 1.8; margin-bottom: 35px; 
            text-align: left; /* Nội dung căn trái */
            min-height: 400px; 
        }
        .slide-content h3 { 
            text-align: center; /* Tiêu đề căn giữa */
            color: var(--accent-neon); font-family: var(--font-head);
            margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase;
        }
        .formula-box {
            text-align: center; /* Công thức căn giữa */
            background: rgba(0, 0, 0, 0.3);
            padding: 20px; border-radius: 20px; margin: 25px 0;
            border: 1px dashed var(--accent-neon);
            font-family: var(--font-head); font-weight: 700; color: var(--accent-neon);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .slide-content ul, .slide-content ol { padding-left: 35px; margin-bottom: 20px; }
        .slide-content b { color: var(--accent-neon); }
        .example-box { border-left: 3px solid var(--correct-glow); padding-left: 15px; margin: 15px 0; font-style: italic; opacity: 0.9; }

        #slide-dots { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: 0.3s; }
        .dot.active { background: var(--accent-neon); transform: scale(1.4); box-shadow: 0 0 10px var(--accent-neon); }

        /* QUIZ */
        .question-text { font-size: 1.4rem; margin-bottom: 2.2rem; line-height: 1.6; font-weight: 500; color: #fff; }
        .option { 
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 16px 22px; border-radius: 20px; cursor: pointer; margin-bottom: 12px; transition: 0.3s; 
        }
        .option:hover:not(.disabled) { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-neon); transform: translateX(10px); }
        .option.correct { background: rgba(0, 255, 136, 0.2) !important; border-color: var(--correct-glow) !important; box-shadow: 0 0 40px rgba(0, 255, 136, 0.6), inset 0 0 15px rgba(0, 255, 136, 0.3); }
        .option.incorrect { background: rgba(255, 61, 113, 0.2) !important; border-color: var(--incorrect-glow) !important; box-shadow: 0 0 40px rgba(255, 61, 113, 0.6), inset 0 0 15px rgba(255, 61, 113, 0.3); }

        .explanation-box { display: none; margin-top: 30px; padding: 25px; background: rgba(0, 0, 0, 0.3); border-radius: 25px; border-left: 6px solid var(--accent-neon); }
        
        .btn { padding: 16px 35px; border-radius: 100px; border: none; font-weight: 700; font-family: var(--font-head); cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .btn-neon { background: var(--accent-neon); color: #0f172a; box-shadow: 0 0 25px rgba(0, 242, 255, 0.4); }
        .btn-outline { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(35px); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .popup-content { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.2); padding: 60px; border-radius: 50px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo" id="headerTitle">APTIS MASTER</div>
        <div id="timerDisplay">10:00</div>
        <button class="btn" style="padding:8px 22px; font-size:0.7rem; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.2);" onclick="location.reload()">HOME</button>
    </div>

    <div class="container">
        <div id="home-view">
            <h2 style="font-weight: 900; letter-spacing: 5px; margin-bottom: 40px; text-align: center; font-family: var(--font-head);">HÃY CHỌN CHẾ ĐỘ HỌC TẬP</h2>
            <div class="subject-grid">
                <div class="mock-test-hero" id="btnStartQuiz">
                    <div>
                        <div style="font-family: var(--font-head); font-weight: 900; font-size: 1.5rem; color: #fff;">THI THỬ TỔNG HỢP</div>
                        <div style="opacity: 0.6; font-size: 0.9rem; margin-top: 5px;">20 câu hỏi ngẫu nhiên • 10 phút làm bài</div>
                    </div>
                    <div style="font-size: 2.5rem;">⚡</div>
                </div>
                <div id="grid-content" style="display: contents;"></div>
            </div>
        </div>

        <div id="theory-area" class="glass-card">
            <div id="slide-text" class="slide-content"></div>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button class="btn btn-outline" id="prevSlide" style="padding: 10px 25px;">Trước</button>
                <button class="btn btn-neon" id="nextSlide" style="padding: 10px 25px;">Tiếp theo</button>
            </div>
            <div id="slide-dots"></div>
        </div>

        <div id="quiz-area"></div>
        <div id="quizFooter" style="text-align: center; padding: 20px;">
            <button id="viewScoreButton" class="btn btn-neon" style="display:none;">NỘP BÀI KẾT THÚC</button>
        </div>
    </div>

    <div class="popup-overlay" id="choicePopup">
        <div class="popup-content">
            <h2 id="choiceTitle" style="margin-bottom: 15px;">BẠN MUỐN?</h2>
            <p style="opacity: 0.6; margin-bottom: 35px;">Thành công chỉ đến với người chuẩn bị tốt.</p>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button class="btn btn-neon" id="choiceStudy">HỌC LÝ THUYẾT</button>
                <button class="btn btn-outline" id="choiceQuiz">LÀM BÀI LUÔN</button>
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="resultsPopup">
        <div class="popup-content">
            <h2 style="font-weight: 900; letter-spacing: 5px; opacity: 0.5;">KẾT QUẢ</h2>
            <div id="scoreDisplay" style="font-size: 6.5rem; font-family: var(--font-head); font-weight: 900; color: var(--accent-neon); margin: 15px 0;"></div>
            <button class="btn btn-neon" onclick="location.reload()">QUAY LẠI</button>
        </div>
    </div>

    <script>
        // NGÂN HÀNG CÂU HỎI (Bạn hãy dán 700 câu vào đây)
        const allQuestions = [
 { id: 1, q: "Faraday made many … in the field of physics and chemistry.", o: ["discover", "discoveries", "discovered", "discovering"], a: "discoveries", ex: "Căn cứ bằng từ 'many'. Sau many + N (số nhiều). Cụm từ: make discovery = discover (v): khám phá, tìm ra.", vn: "Faraday đã có nhiều khám phá trong lĩnh vực vật lí và hoá học." },
{ id: 2, q: "Faraday was an … in Davy's laboratory.", o: ["assistance", "assist", "assistant", "assisted"], a: "assistant", ex: "Căn cứ bằng mạo từ 'an'. Sau mạo từ + N. assistant (n): trợ lý, người phụ tá.", vn: "Faraday là người giúp việc trong phòng thí nghiệm của Davy." },
{ id: 3, q: "The generator is one of Faraday's most important … .", o: ["achievements", "achievement", "achieve", "achieving"], a: "achievements", ex: "Căn cứ vào cụm từ 'one of + N (số nhiều)'.", vn: "Máy phát điện là một trong những thành tựu quan trọng nhất của Faraday." },
{ id: 4, q: "His … of the generator is very famous.", o: ["invent", "inventive", "invention", "inventor"], a: "invention", ex: "Căn cứ bằng tính từ sở hữu 'his'. Sau tính từ sở hữu + N.", vn: "Phát minh về máy phát điện của ông ấy rất nổi tiếng." },
{ id: 5, q: "We will … our English vocabulary if we read English books every day.", o: ["rich", "richness", "enrich", "richly"], a: "enrich", ex: "Căn cứ bằng từ 'will'. Sau will + V (bare). enrich (v): làm giàu.", vn: "Chúng ta sẽ làm giàu vốn từ vựng tiếng Anh nếu như chúng ta đọc sách Tiếng Anh hằng ngày." },
{ id: 6, q: "You study very well. It's … that you will fail the exam.", o: ["possible", "impossible", "possibility", "impossibility"], a: "impossible", ex: "Căn cứ bằng từ 'It's = It is'. Sau to be + adj. Dựa vào nghĩa: học tốt thì việc thi trượt là không thể.", vn: "Bạn học rất giỏi. Việc bạn thi trượt là không thể." },
{ id: 7, q: "Lan always shares her … with me.", o: ["sadness", "sad", "sadly", "unsad"], a: "sadness", ex: "Căn cứ bằng tính từ sở hữu 'her'. Sau tính từ sở hữu + N.", vn: "Lan luôn chia sẻ nỗi buồn với tôi." },
{ id: 8, q: "These children have the … to imitate animals' voice.", o: ["able", "ability", "disable", "disability"], a: "ability", ex: "Căn cứ bằng mạo từ 'the'. Sau mạo từ + N. ability (n): năng lực, khả năng.", vn: "Những đứa trẻ này có khả năng bắt chước giọng của động vật." },
{ id: 9, q: "Money doesn't bring … to man.", o: ["happy", "happiness", "happily", "unhappy"], a: "happiness", ex: "Căn cứ bằng từ 'bring' + N. happiness (n): niềm hạnh phúc.", vn: "Tiền không mang lại hạnh phúc cho con người." },
{ id: 10, q: "Good students aren't … intelligent students.", o: ["necessary", "necessity", "necessarily", "unnecessary"], a: "necessarily", ex: "Cần một trạng từ bổ nghĩa cho tính từ 'intelligent'.", vn: "Những học sinh giỏi không nhất thiết phải là những học sinh thông minh." },
{ id: 11, q: "I don't believe what he has just said. It is …", o: ["reason", "unreasonable", "reasonably", "reasoning"], a: "unreasonable", ex: "Sau to be 'is' là tính từ. unreasonable (a): vô lý, phi lý.", vn: "Tôi không tin điều anh ấy vừa nói. Nó rất phi lý." },
{ id: 12, q: "The teacher does everything in order to … her students.", o: ["courage", "encourage", "encouragement", "encouraged"], a: "encourage", ex: "Cấu trúc in order to + V (bare): để mà. encourage (v): khuyến khích.", vn: "Giáo viên làm mọi thứ để khích lệ học sinh của cô ấy." },
{ id: 13, q: "What is his … ? Is he American or English?", o: ["national", "nationality", "nationalize", "international"], a: "nationality", ex: "Sau tính từ sở hữu 'his' là danh từ. nationality (n): quốc tịch.", vn: "Quốc tịch của anh ấy là gì? Anh ấy là người Mỹ hay người Anh?" },
{ id: 14, q: "You should spend your free time … .", o: ["useful", "useless", "usefully", "uselessly"], a: "usefully", ex: "Sau động từ 'spend' + O + trạng từ. usefully (adv): một cách có ích.", vn: "Bạn nên dành thời gian rảnh rỗi của bạn một cách có ích." },
{ id: 15, q: "Please decide what you want to do. You must make a …", o: ["decide", "decision", "decisive", "decisively"], a: "decision", ex: "Cụm từ cố định: make a decision: quyết định.", vn: "Làm ơn hãy quyết định điều bạn muốn làm. Bạn phải quyết định." },
{ id: 16, q: "He is interested in the … of old buildings.", o: ["preserve", "preservation", "preservative", "preserved"], a: "preservation", ex: "Sau mạo từ 'the' là danh từ. preservation (n): sự gìn giữ, bảo tồn.", vn: "Anh ấy quan tâm đến việc gìn giữ những tòa nhà cổ." },
{ id: 17, q: "He has very high … of his only son.", o: ["expect", "expectation", "expected", "expectedly"], a: "expectation", ex: "Sau tính từ 'high' là danh từ. expectation (n): sự mong đợi, kì vọng.", vn: "Anh ấy kì vọng cao vào cậu con trai duy nhất của mình." },
{ id: 18, q: "All of us need the … of fresh air.", o: ["provide", "provided", "provision", "provisions"], a: "provision", ex: "Sau mạo từ 'the' + N. provision (n): sự cung cấp.", vn: "Tất cả chúng ta đều cần nguồn cung cấp không khí trong lành." },
{ id: 19, q: "Farmers need to … crops.", o: ["rotation", "rotate", "rotational", "rotationally"], a: "rotate", ex: "Sau 'to' là động từ nguyên thể V(bare). rotate (v): luân phiên.", vn: "Các bác nông dân cần phải luân canh từng vụ." },
{ id: 20, q: "We are discussing about a problem of great …", o: ["important", "importance", "importantly", "import"], a: "importance", ex: "Sau tính từ 'great' là danh từ. importance (n): tầm quan trọng.", vn: "Chúng tôi đang thảo luận về một vấn đề hết sức quan trọng." },
{ id: 21, q: "He doesn't have a job. He is …", o: ["employed", "unemployed", "employer", "employee"], a: "unemployed", ex: "Sau to be 'is' là tính từ. unemployed (a): thất nghiệp.", vn: "Anh ta không có công ăn việc làm. Anh ấy thất nghiệp." },
{ id: 22, q: "The cost of … must be paid by the buyer.", o: ["carry", "carriage", "carrying", "carried"], a: "carriage", ex: "Sau giới từ 'of' là danh từ. carriage (n): sự chuyên chở hàng hoá.", vn: "Phí vận chuyển phải được trả bởi người mua." },
{ id: 23, q: "We have to … the natural resources of our country.", o: ["conservation", "conserve", "conserved", "conservational"], a: "conserve", ex: "Sau 'have to' + V (bare). conserve (v): gìn giữ, bảo tồn.", vn: "Chúng ta phải gìn giữ nguồn tài nguyên thiên nhiên của đất nước." },
{ id: 24, q: "The industrial … will lead to the country's prosperity.", o: ["develop", "development", "developing", "developed"], a: "development", ex: "Sau tính từ 'industrial' + danh từ. development (n): sự phát triển.", vn: "Sự phát triển công nghiệp sẽ dẫn tới đất nước phồn thịnh." },
{ id: 25, q: "Forests must be managed …", o: ["careless", "careful", "carefully", "care"], a: "carefully", ex: "Sau động từ 'manage' + trạng từ. carefully (adv): một cách cẩn thận.", vn: "Rừng cần phải được quản lí một cách cẩn thận." },
{ id: 26, q: "Her … from school without any excuse made the teacher angry.", o: ["absent", "absence", "absently", "absences"], a: "absence", ex: "Sau tính từ sở hữu 'her' + danh từ. absence (n): sự vắng mặt.", vn: "Việc nghỉ học không phép của cô ấy làm giáo viên tức giận." },
{ id: 27, q: "The little boy felt very … because his parents did not let him go with them.", o: ["disappoint", "disappointment", "disappointed", "disappointing"], a: "disappointed", ex: "Sau động từ tri giác 'felt' + adj. Adj-ed chỉ cảm xúc con người.", vn: "Thằng bé cảm thấy thất vọng bởi vì bố mẹ nó không cho nó đi cùng với họ." },
{ id: 28, q: "Your new dress makes you more …", o: ["beauty", "beautiful", "beautify", "beautifully"], a: "beautiful", ex: "Sau cấu trúc make + O + adj.", vn: "Chiếc váy mới của cậu làm cậu xinh hơn lên." },
{ id: 29, q: "There are a lot of … differences in England.", o: ["region", "regional", "regionally", "regions"], a: "regional", ex: "Trước danh từ 'differences' là tính từ. regional (a): thuộc về vùng miền.", vn: "Có nhiều vùng miền khác nhau ở Anh." },
{ id: 30, q: "The surgeons tried their best to save his life, but unfortunately the operation was …", o: ["success", "successful", "unsuccessful", "sucsessfully"], a: "unsuccessful", ex: "Sau to be 'was' + adj. Dựa vào nghĩa: bác sĩ cố hết sức nhưng 'thật không may' nên là không thành công.", vn: "Các bác sĩ mổ đã cố gắng hết sức để cứu sống anh ấy nhưng thật không may, ca phẫu thuật không thành công." },
{ id: 31, q: "Jane … law at Harvard for four years now.", o: ["is studying", "has been studying", "studies", "studied"], a: "has been studying", ex: "Dấu hiệu 'for four years now' dùng thì hiện tại hoàn thành tiếp diễn để nhấn mạnh quá trình.", vn: "Jane đã và đang học luật tại Harvard được 4 năm rồi." },
{ id: 32, q: "This time tomorrow … on the beach sunbathing and drinking freshly squeezed fruit juice!", o: ["I’ll have been lying", "I will lie", "I will be lying", "I will have lain"], a: "I will be lying", ex: "Dấu hiệu 'This time tomorrow' (giờ này ngày mai) chia thì tương lai tiếp diễn.", vn: "Giờ này ngày mai tôi sẽ đang nằm trên bãi biển tắm nắng và uống nước trái cây!" },
{ id: 33, q: "We … for three hours and we are very tired.", o: ["waited", "have been waiting", "wait", "had waited"], a: "have been waiting", ex: "Hành động kéo dài từ quá khứ đến hiện tại và để lại kết quả (tired), dùng HTHT tiếp diễn.", vn: "Chúng tôi đã đợi suốt 3 tiếng đồng hồ và chúng tôi rất mệt." },
{ id: 34, q: "She … for hours. That’s why her eyes are red now.", o: ["cried", "has been crying", "was crying", "has cried"], a: "has been crying", ex: "Nhấn mạnh quá trình của hành động vừa kết thúc để lại hậu quả ở hiện tại (eyes are red).", vn: "Cô ấy đã khóc suốt nhiều giờ. Đó là lý do tại sao mắt cô ấy bây giờ đỏ hoe." },
{ id: 35, q: "The host will read the questions … .", o: ["until the participants will be fully prepared", "after the participants had been fully prepared", "after the participants are fully prepared", "before the participants was fully prepared"], a: "after the participants are fully prepared", ex: "Hành động trong tương lai: Mệnh đề chính (tương lai đơn) + after + mệnh đề thời gian (hiện tại đơn).", vn: "Người dẫn chương trình sẽ đọc các câu hỏi sau khi người tham gia đã chuẩn bị đầy đủ." },
{ id: 36, q: "He will take the dog out for a walk … .", o: ["as soon as he finishes", "when I was finishing dinner", "until I finished dinner", "shall have finished"], a: "as soon as he finishes", ex: "Sự phối hợp thì: Tương lai đơn + as soon as + Hiện tại đơn.", vn: "Anh ấy sẽ dắt chó đi dạo ngay khi anh ấy kết thúc công việc." },
{ id: 37, q: "By the year 2021, 6% of all US jobs … by robots, report says.", o: ["will eliminate", "will have been eliminated", "will be eliminating", "will have eliminated"], a: "will have been eliminated", ex: "Dấu hiệu 'By + mốc thời gian tương lai' chia thì tương lai hoàn thành (dạng bị động).", vn: "Trước năm 2021, 6% công việc tại Mỹ sẽ bị loại bỏ bởi robot." },
{ id: 38, q: "She will take management training course …", o: ["right after the epidemic has been controlled", "as soon as the epidemic was controlled", "when the epidemic had been controlled", "until the epidemic will be controlled"], a: "right after the epidemic has been controlled", ex: "Tương lai đơn + after + Hiện tại hoàn thành (nhấn mạnh hành động phải xong trước).", vn: "Cô ấy sẽ tham gia khóa đào tạo quản lý ngay sau khi dịch bệnh được kiểm soát." },
{ id: 39, q: "He will take the dog out for a walk … .", o: ["as soon as he finishes", "when I was finishing dinner", "until I finished dinner", "shall have finished"], a: "as soon as he finishes", ex: "Tương lai đơn + as soon as + Hiện tại đơn.", vn: "Anh ấy sẽ dắt chó đi dạo ngay khi anh ấy hoàn thành." },
{ id: 40, q: "When I last saw him, he … in London.", o: ["is living", "has been living", "was living", "lived"], a: "was living", ex: "Hành động đang diễn ra tại một thời điểm trong quá khứ khi hành động khác xen vào.", vn: "Khi tôi gặp anh ấy lần cuối, anh ấy đang sống ở London." },
{ id: 41, q: "By the time he arrives here tomorrow, they … for London.", o: ["would have left", "will have left", "will left", "are leaving"], a: "will have left", ex: "Cấu trúc: By the time + Hiện tại đơn, Tương lai hoàn thành.", vn: "Trước lúc anh ấy đến đây vào ngày mai, họ sẽ đã rời đi London rồi." },
{ id: 42, q: "Mr. Pike … English at our school for 20 years before he retired last year.", o: ["had been teaching", "has been teaching", "was teaching", "is teaching"], a: "had been teaching", ex: "Hành động xảy ra trước một hành động khác trong quá khứ và kéo dài liên tục, dùng QKHT tiếp diễn.", vn: "Ông Pike đã dạy tiếng Anh tại trường chúng tôi được 20 năm trước khi ông ấy nghỉ hưu năm ngoái." },
{ id: 43, q: "They … for Japan at 10.30 tomorrow.", o: ["will be leaving", "have left", "will have left", "will leave"], a: "will be leaving", ex: "Thời điểm xác định trong tương lai (10.30 tomorrow) chia tương lai tiếp diễn.", vn: "Họ sẽ đang khởi hành đi Nhật Bản vào lúc 10 giờ 30 ngày mai." },
{ id: 44, q: "When I … to the airport, I realized that I … my passport at home.", o: ["got/had left", "got/left", "had got/had left", "got/was left"], a: "got/had left", ex: "Hành động quên hộ chiếu (leave) xảy ra trước hành động đến sân bay (get), dùng QKHT.", vn: "Khi tôi đến sân bay, tôi nhận ra rằng mình đã để quên hộ chiếu ở nhà." },
{ id: 45, q: "I … was angry when you saw me because I … with my sister.", o: ["have been arguing", "had been arguing", "argued", "would argue"], a: "had been arguing", ex: "Hành động tranh cãi xảy ra trước và kéo dài dẫn đến kết quả ở quá khứ (was angry), dùng QKHT tiếp diễn.", vn: "Lúc đó tôi đang giận khi bạn thấy tôi vì tôi đã cãi nhau với chị gái mình." },
{ id: 46, q: "Call me as soon as you … your test results.", o: ["get", "will get", "will have got", "got"], a: "get", ex: "Mệnh đề thời gian với 'as soon as' không dùng tương lai, dùng hiện tại đơn thay thế.", vn: "Hãy gọi cho tôi ngay khi bạn có kết quả kiểm tra." },
{ id: 47, q: "I … to Greece until Sally and I went there last summer.", o: ["have never been", "had never been", "was never being", "were never"], a: "had never been", ex: "Hành động chưa từng đi Hy Lạp xảy ra trước mốc thời gian 'mùa hè năm ngoái', dùng QKHT.", vn: "Tôi chưa từng đến Hy Lạp cho đến khi Sally và tôi đi đến đó vào mùa hè năm ngoái." },
{ id: 48, q: "I … along the street when I suddenly heard footsteps behind me.", o: ["was walking", "am walking", "walk", "walked"], a: "was walking", ex: "Hành động đang xảy ra (walking) thì hành động khác cắt ngang (heard), dùng QK tiếp diễn.", vn: "Tôi đang đi bộ dọc theo con phố thì bỗng nhiên nghe thấy tiếng bước chân phía sau." },
{ id: 49, q: "He occasionally … a headache in the morning.", o: ["has had", "has", "have", "is having"], a: "has", ex: "Dấu hiệu 'occasionally' (thỉnh thoảng) diễn tả thói quen, dùng hiện tại đơn.", vn: "Anh ấy thỉnh thoảng bị đau đầu vào buổi sáng." },
{ id: 50, q: "The boy fell while he … down the stairs.", o: ["run", "running", "was running", "runs"], a: "was running", ex: "Hành động đang diễn ra (running) thì hành động khác cắt ngang (fell), dùng QK tiếp diễn.", vn: "Cậu bé bị ngã khi đang chạy xuống cầu thang." },
{ id: 51, q: "I will come and see you before I … for America.", o: ["leave", "will leave", "have left", "left"], a: "leave", ex: "Mệnh đề thời gian với 'before' dùng hiện tại đơn để thay thế tương lai đơn.", vn: "Tôi sẽ đến thăm bạn trước khi tôi đi Mỹ." },
{ id: 52, q: "When the first child was born, they … for three years.", o: ["have been married", "had been married", "will be married", "will have been married"], a: "had been married", ex: "Hành động kết hôn đã hoàn thành trước mốc quá khứ (đứa con đầu lòng ra đời), dùng QKHT.", vn: "Khi đứa con đầu lòng chào đời, họ đã kết hôn được 3 năm rồi." },
{ id: 53, q: "It … a long time since we were apart. I did not recognize her.", o: ["is", "has been", "was", "had been"], a: "has been", ex: "Cấu trúc: It + has been + time + since + S + V(quá khứ đơn).", vn: "Đã một thời gian dài kể từ khi chúng tôi xa cách. Tôi đã không nhận ra cô ấy." },
{ id: 54, q: "Many of the people who attended Mr. David’s funeral … him for many years.", o: ["didn’t see", "wouldn’t see", "haven’t seen", "had hadn’t seen"], a: "had hadn’t seen", ex: "Hành động 'không gặp' diễn ra trước thời điểm đám tang (quá khứ), dùng QKHT.", vn: "Nhiều người dự đám tang ông David đã không gặp ông ấy trong nhiều năm." },
{ id: 55, q: "We were both very excited about the visit, as we … each other for ages.", o: ["never saw", "didn’t see", "hadn’t seen", "haven’t seen"], a: "had hadn’t seen", ex: "Tương tự câu trên, hành động không gặp xảy ra trước thời điểm thăm hỏi ở quá khứ.", vn: "Cả hai chúng tôi đều rất hào hứng về chuyến thăm, vì chúng tôi đã không gặp nhau từ lâu lắm rồi." },
{ id: 56, q: "In one year’s time, she … for this company for 15 years.", o: ["will be working", "will have been working", "will work", "has worked"], a: "will have been working", ex: "Dấu hiệu 'In one year's time' kết hợp với khoảng thời gian 'for 15 years', dùng tương lai hoàn thành tiếp diễn.", vn: "Trong vòng một năm nữa, cô ấy sẽ đã làm việc cho công ty này được 15 năm." },
{ id: 57, q: "His health has improved a lot since he … doing exercises regularly.", o: ["starts", "started", "has started", "had started"], a: "started", ex: "Sau 'since' dùng thì quá khứ đơn.", vn: "Sức khỏe của anh ấy đã cải thiện rất nhiều kể từ khi anh ấy bắt đầu tập thể dục thường xuyên." },
{ id: 58, q: "She hurt herself while she … hide-and-seek with her friends.", o: ["is playing", "had played", "played", "was playing"], a: "was playing", ex: "Hành động đang diễn ra (playing) thì bị ngã (hurt), dùng quá khứ tiếp diễn.", vn: "Cô ấy tự làm mình bị thương khi đang chơi trốn tìm với bạn." },
{ id: 59, q: "What … at 9 o’clock last night? I phoned you but couldn’t get through to you.", o: ["did you do", "were you doing", "would you do", "had you done"], a: "were you doing", ex: "Thời điểm xác định trong quá khứ (9 o'clock last night) dùng quá khứ tiếp diễn.", vn: "Bạn đang làm gì vào lúc 9 giờ tối qua? Tôi gọi nhưng không liên lạc được." },
{ id: 60, q: "It is raining heavily with rolls of thunder. We … such a terrible thunderstorm.", o: ["would never see", "had never seen", "have never seen", "never see"], a: "have never seen", ex: "Diễn tả trải nghiệm cho đến thời điểm hiện tại, dùng hiện tại hoàn thành.", vn: "Trời đang mưa to kèm sấm sét. Chúng tôi chưa bao giờ thấy cơn dông bão nào kinh khủng như vậy." },
{ id: 61, q: "I … my old teacher last week.", o: ["visited", "visit", "am visiting", "have visited"], a: "visited", ex: "Dấu hiệu 'last week' chia thì quá khứ đơn.", vn: "Tôi đã đi thăm thầy giáo cũ vào tuần trước." },
{ id: 62, q: "My brother usually … me for help when he has any difficulties with his homework.", o: ["ask", "asks", "asked", "has asked"], a: "asks", ex: "Dấu hiệu 'usually' diễn tả thói quen ở hiện tại, chủ ngữ số ít thêm -s.", vn: "Anh trai tôi thường nhờ tôi giúp đỡ khi anh ấy gặp khó khăn với bài tập về nhà." },
{ id: 63, q: "I … all of my homework last night.", o: ["finish", "will finish", "have finished", "finished"], a: "finished", ex: "Dấu hiệu 'last night' dùng quá khứ đơn.", vn: "Tôi đã hoàn thành tất cả bài tập về nhà tối qua." },
{ id: 64, q: "Lan … learning English a few years ago.", o: ["starts", "will start", "started", "is starting"], a: "started", ex: "Dấu hiệu 'a few years ago' dùng quá khứ đơn.", vn: "Lan đã bắt đầu học tiếng Anh vài năm trước." },
{ id: 65, q: "Only after she … from a severe illness did she realize the importance of good health.", o: ["would recover", "has recovered", "had recovered", "was recovering"], a: "had recovered", ex: "Hành động hồi phục xảy ra trước hành động nhận ra (realize), dùng QKHT.", vn: "Chỉ sau khi hồi phục sau cơn bạo bệnh, cô ấy mới nhận ra tầm quan trọng của sức khỏe." },
{ id: 66, q: "Only after the bus … for a few miles did Jane realize she was on the wrong route.", o: ["was running", "had run", "has run", "runs"], a: "had run", ex: "Hành động xe bus chạy xảy ra trước thời điểm Jane nhận ra, dùng QKHT.", vn: "Chỉ sau khi xe bus đã chạy được vài dặm, Jane mới nhận ra mình đi nhầm tuyến." },
{ id: 67, q: "The children … to bed before their parents came home from work.", o: ["were all going", "had all gone", "had all been going", "have all gone"], a: "had all gone", ex: "Hành động đi ngủ xảy ra trước khi bố mẹ về (came), dùng QKHT.", vn: "Những đứa trẻ đã đi ngủ trước khi bố mẹ chúng đi làm về." },

{ id: 69, q: "I haven’t met him again since we … school ten years ago.", o: ["have left", "leave", "left", "had left"], a: "left", ex: "Sau 'since' chia thì quá khứ đơn.", vn: "Tôi đã không gặp lại anh ấy kể từ khi chúng tôi tốt nghiệp 10 năm trước." },
{ id: 70, q: "For the last 20 years, we … significant changes in the world of science and technology.", o: ["witness", "have witnessed", "witnessed", "are witnessing"], a: "have witnessed", ex: "Dấu hiệu 'For the last + thời gian' dùng thì hiện tại hoàn thành.", vn: "Trong 20 năm qua, chúng ta đã chứng kiến những thay đổi đáng kể trong thế giới khoa học và công nghệ." },
{ id: 71, q: "My best friend Lan … to England 10 years ago.", o: ["was moving", "moves", "moved", "has moved"], a: "moved", ex: "Dấu hiệu '10 years ago' dùng quá khứ đơn.", vn: "Bạn thân của tôi, Lan, đã chuyển đến Anh 10 năm trước." },

{ id: 74, q: "By the end of last March, I … English for five years.", o: ["had been studied", "had been studying", "will have been studying", "will have studied"], a: "had been studying", ex: "Dấu hiệu 'By the end of + mốc quá khứ' dùng thì quá khứ hoàn thành tiếp diễn để nhấn mạnh tính liên tục.", vn: "Tính đến cuối tháng 3 vừa rồi, tôi đã học tiếng Anh được 5 năm." },
{ id: 75, q: "… Alan for hours but he hasn’t answered his mobile. I hope nothing’s wrong.", o: ["I call", "I’ve been calling", "I’m calling", "called"], a: "I’ve been calling", ex: "Hành động gọi điện kéo dài liên tục từ quá khứ đến hiện tại, dùng HTHT tiếp diễn.", vn: "Tôi đã gọi cho Alan suốt mấy tiếng rồi nhưng anh ấy không nghe máy. Tôi hy vọng không có chuyện gì xấu." },
{ id: 76, q: "We … in silence when he suddenly … me to help him.", o: ["walked - was asking", "were walking - asked", "were walking - was asking", "walked - asked"], a: "were walking - asked", ex: "Đang đi bộ (were walking) thì đột nhiên hỏi (asked), dùng QK tiếp diễn và QK đơn.", vn: "Chúng tôi đang đi bộ trong im lặng thì đột nhiên anh ấy nhờ tôi giúp đỡ." },
{ id: 77, q: "By the time the software … on sale next month, the company … $2 million on developing it.", o: ["went - had spent", "will go - has spent", "has gone - will spend", "goes - will have spent"], a: "goes - will have spent", ex: "Cấu trúc: By the time + Hiện tại đơn, Tương lai hoàn thành.", vn: "Vào thời điểm phần mềm được bán ra vào tháng tới, công ty sẽ đã chi 2 triệu đô để phát triển nó." },

{ id: 82, q: "When I came to visit her last night, she … a bath.", o: ["is having", "was having", "has had", "had had"], a: "was having", ex: "Hành động đang diễn ra tại thời điểm khách đến thăm ở quá khứ.", vn: "Khi tôi đến thăm cô ấy tối qua, cô ấy đang đi tắm." },

{ id: 208, q: "The ticket to London doesn’t cost a lot, … ?", o: ["do they", "does it", "is it", "isn’t it"], a: "does it", ex: "Vế trước phủ định 'doesn't cost', vế sau khẳng định 'does it'.", vn: "Vé đi London không đắt lắm, phải không?" },
{ id: 209, q: "You don’t need me any more, … ?", o: ["do I", "don’t I", "do you", "don’t you"], a: "do you", ex: "Vế trước phủ định, vế sau khẳng định.", vn: "Bạn không cần tôi nữa, đúng không?" },
{ id: 210, q: "Nobody knows who invited the wheel, … ?", o: ["do they", "don’t they", "does it", "doesn’t it"], a: "do they", ex: "'Nobody' mang nghĩa phủ định, chủ ngữ 'they' nên dùng trợ động từ 'do'.", vn: "Không ai biết ai đã mời bánh xe, phải không?" },
{ id: 211, q: "Harry was working in Bristol then, … ?", o: ["was Harry", "wasn’t he", "was he", "didn’t he"], a: "wasn’t he", ex: "Thì quá khứ tiếp diễn khẳng định, đuôi dùng phủ định.", vn: "Lúc đó Harry đang làm việc ở Bristol, phải không?" },
{ id: 212, q: "You’ll be home before midnight, … ?", o: ["will you", "won’t you", "are you", "won’t you be"], a: "won’t you", ex: "'Will' khẳng định chuyển sang phủ định là 'won't'.", vn: "Bạn sẽ về nhà trước nửa đêm chứ?" },
{ id: 213, q: "David is bringing some wine, … ?", o: ["is he", "isn’t he", "is David", "isn’t David"], a: "isn’t he", ex: "Động từ 'is' chuyển sang phủ định 'isn't', danh từ 'David' dùng đại từ 'he'.", vn: "David đang mang rượu đến, phải không?" },
{ id: 214, q: "Don’t leave anything behind, … ?", o: ["do you", "don’t you", "will you", "shall we"], a: "will you", ex: "Câu mệnh lệnh phủ định dùng đuôi 'will you'.", vn: "Đừng để quên thứ gì nhé?" },
{ id: 215, q: "Nobody likes the play, … ?", o: ["do they", "don’t they", "didn’t they", "did they"], a: "do they", ex: "'Nobody' là phủ định, chủ ngữ số nhiều 'they' dùng trợ động từ 'do'.", vn: "Không ai thích vở kịch đó, đúng không?" },
{ id: 216, q: "The children can read English, … ?", o: ["can’t they", "can they", "they can", "they can’t"], a: "can’t they", ex: "Vế trước khẳng định dùng 'can', đuôi dùng 'can't'.", vn: "Những đứa trẻ có thể đọc tiếng Anh, đúng không?" },
{ id: 217, q: "Your grandfather was a millionaire, … ?", o: ["was he", "is he", "wasn’t he", "isn’t he"], a: "wasn’t he", ex: "Vế trước dùng 'was', đuôi dùng 'wasn't'.", vn: "Ông của bạn từng là triệu phú, phải không?" },
{ id: 218, q: "Your brother’s here, … ?", o: ["is he", "are he", "isn’t he", "aren’t he"], a: "isn’t he", ex: "'Your brother's' là 'Your brother is', đuôi dùng 'isn't he'.", vn: "Anh trai bạn đang ở đây, đúng không?" },
{ id: 219, q: "That was Ann on the phone, … ?", o: ["was it", "was that", "wasn’t that", "wasn’t it"], a: "wasn’t it", ex: "Chủ ngữ 'That' chuyển thành 'it' ở câu hỏi đuôi.", vn: "Đó là Ann trên điện thoại, phải không?" },
{ id: 220, q: "Tom didn't see her, … ?", o: ["did Tom", "did he", "do Tom", "does he"], a: "did he", ex: "Vế trước phủ định quá khứ đơn, đuôi dùng khẳng định.", vn: "Tom không nhìn thấy cô ấy, phải không?" },
{ id: 221, q: "Mary wasn't angry, … ?", o: ["was she", "is she", "wasn’t she", "was Mary"], a: "was she", ex: "Vế trước phủ định, đuôi dùng khẳng định.", vn: "Mary đã không giận dữ, đúng không?" },
{ id: 222, q: "My wife had never been to Hue, and … I.", o: ["never have", "so did we", "we did either", "neither had"], a: "neither had", ex: "Cấu trúc đồng tình phủ định: neither + trợ động từ + chủ ngữ. (Câu gốc dùng QKHT 'had never been').", vn: "Vợ tôi chưa từng đến Huế, và tôi cũng vậy." },
{ id: 223, q: "They are studying pronunciation with Mr. Brown, … ?", o: ["are they", "aren’t they", "do they", "don’t they"], a: "aren’t they", ex: "Thì hiện tại tiếp diễn khẳng định, đuôi dùng phủ định.", vn: "Họ đang học phát âm với thầy Brown, đúng không?" },
{ id: 224, q: "She should have obeyed her parents, … she?", o: ["should", "should have", "shouldn't have", "shouldn't"], a: "shouldn't", ex: "Câu hỏi đuôi chỉ lấy động từ khuyết thiếu đầu tiên 'should' chuyển sang phủ định.", vn: "Đáng lẽ cô ấy nên vâng lời bố mẹ mình, phải không?" },
{ id: 225, q: "My father doesn’t speak Chinese, and …", o: ["my mother does neither", "my mother doesn't too", "neither does my mother", "so doesn’t my mother"], a: "neither does my mother", ex: "Cấu trúc đồng tình phủ định: neither + trợ động từ + chủ ngữ.", vn: "Bố tôi không nói tiếng Trung, và mẹ tôi cũng không." },
{ id: 226, q: "The air-hostess knows the time she has been here, …", o: ["does she", "isn’t it", "doesn’t she", "did she"], a: "doesn’t she", ex: "Thì hiện tại đơn chủ ngữ số ít, đuôi dùng phủ định 'doesn't'.", vn: "Nữ tiếp viên hàng không biết thời gian cô ấy đã ở đây, phải không?" },
{ id: 227, q: "This is the second time she has been here, … ?", o: ["has she", "hasn't she", "isn’t this", "isn't it"], a: "isn't it", ex: "Cấu trúc 'This is...' dùng đuôi 'isn't it'.", vn: "Đây là lần thứ hai cô ấy đến đây, đúng không?" },
{ id: 228, q: "They must do as they are told, …", o: ["so must I", "I must either", "I do too", "I am too"], a: "so must I", ex: "Cấu trúc đồng tình khẳng định: so + trợ động từ + chủ ngữ.", vn: "Họ phải làm như được bảo, và tôi cũng vậy." },
{ id: 229, q: "“I don’t like strong coffee.” – “No, … ”", o: ["I don't too", "either don't I", "me either", "neither do I"], a: "neither do I", ex: "Đồng tình với câu phủ định, dùng cấu trúc 'neither + trợ động từ + I'.", vn: "“Tôi không thích cà phê đặc.” – “Tôi cũng không.”" },
{ id: 230, q: "He hardly does homework, … ?", o: ["has he", "doesn’t he", "does he", "hasn't she"], a: "does he", ex: "Từ 'hardly' (hầu như không) mang nghĩa phủ định, nên đuôi khẳng định.", vn: "Anh ấy hầu như không làm bài tập về nhà, phải không?" },
{ id: 231, q: "I … with you on that subject.", o: ["am agree", "am agreed", "agreeing", "agree"], a: "agree", ex: "Động từ 'agree' không dùng ở dạng bị động hoặc to be trong câu khẳng định hiện tại đơn.", vn: "Tôi đồng ý với bạn về chủ đề đó." },
{ id: 232, q: "Many American automobiles … in Detroit, Michigan.", o: ["manufacture", "have manufactured", "are manufactured", "are manufacturing"], a: "are manufactured", ex: "Chủ ngữ là vật 'automobiles', chia bị động thì hiện tại đơn.", vn: "Nhiều xe ô tô Mỹ được sản xuất tại Detroit, Michigan." },
{ id: 233, q: "Let’s go ahead and do it now. Nothing … by waiting.", o: ["accomplishes", "accomplished", "has accomplished", "will be accomplished"], a: "will be accomplished", ex: "Dự đoán sự việc trong tương lai, dùng bị động tương lai đơn.", vn: "Hãy cứ tiến hành ngay bây giờ đi. Chẳng đạt được gì nếu cứ chờ đợi đâu." },
{ id: 234, q: "“When … ?” - “In 1928.”", o: ["penicillin was invented", "did penicillin invented", "was penicillin invented", "did penicillin invent"], a: "was penicillin invented", ex: "Câu hỏi ở thì quá khứ đơn, dạng bị động của vật.", vn: "“Penicillin được phát minh khi nào?” - “Vào năm 1928.”" },
{ id: 235, q: "Both domestic and imported automobiles must … anti-pollution devices.", o: ["equip with", "be equipped with", "equip by", "be equipped by"], a: "be equipped with", ex: "Cấu trúc bị động sau động từ khuyết thiếu: must + be + V3. Cụm từ: be equipped with (được trang bị với).", vn: "Cả ô tô trong nước và nhập khẩu đều phải được trang bị các thiết bị chống ô nhiễm." },
{ id: 236, q: "The first draft resolution … yesterday; it … long before the beginning of the meeting.", o: ["has not been discussed - had been withdrawn", "was not discussed - has been withdrawn", "was not discussed - had been withdrawn", "had not been discussed - was withdrawn"], a: "was not discussed - had been withdrawn", ex: "Sự việc thứ nhất xảy ra hôm qua (yesterday) dùng QK đơn. Sự việc rút lại xảy ra trước đó dùng QK hoàn thành.", vn: "Bản dự thảo nghị quyết đầu tiên đã không được thảo luận ngày hôm qua; nó đã được rút lại từ lâu trước khi cuộc họp bắt đầu." },
{ id: 237, q: "He is not in town; he … on a special mission.", o: ["is sending", "will be sent", "has sent", "has been sent"], a: "has been sent", ex: "Kết quả hiện tại anh ta không có ở đây là do đã được cử đi (chia HTHT bị động).", vn: "Anh ấy không có ở trong thị trấn; anh ấy đã được cử đi làm một nhiệm vụ đặc biệt." },
{ id: 238, q: "Don’t come into the compartment; the berth … now.", o: ["is being fixed", "has been fixed", "is fixed", "is being fixing"], a: "is being fixed", ex: "Hành động đang diễn ra (now) chia hiện tại tiếp diễn dạng bị động.", vn: "Đừng vào trong khoang; chỗ nằm đang được sửa sang bây giờ." },
{ id: 239, q: "A new underground line … now. They say one of its stations … in my street.", o: ["is constructed - will be built", "is being constructed - has been built", "is being constructed - will be built", "will be constructed - to be built"], a: "is being constructed - will be built", ex: "Now dùng HT tiếp diễn bị động. Vế sau là dự đoán tương lai dùng 'will be built'.", vn: "Một tuyến tàu điện ngầm mới đang được xây dựng. Người ta nói một trong các ga sẽ được xây trên phố của tôi." },
{ id: 240, q: "He wants to know when the final decision … .", o: ["has been taken", "will be taken", "will be spoken", "is taken"], a: "will be taken", ex: "Câu hỏi về một sự việc chưa xảy ra, dùng bị động tương lai đơn.", vn: "Anh ấy muốn biết khi nào quyết định cuối cùng sẽ được đưa ra." },
{ id: 241, q: "It was three o’clock. We … to hurry up because we … .", o: ["were told - were being waited", "had been told - were waited", "were told - were waiting", "told - were being waited"], a: "were told - were being waited", ex: "Chúng tôi được bảo (bị động QK đơn) vì có người đang đợi chúng tôi (bị động QK tiếp diễn).", vn: "Lúc đó là 3 giờ. Chúng tôi được bảo phải khẩn trương lên vì mọi người đang đợi." },
{ id: 242, q: "Do you believe that such a problem can … ?", o: ["solve", "be solving", "is solved", "be solved"], a: "be solved", ex: "Bị động với động từ khuyết thiếu: can + be + V3.", vn: "Bạn có tin rằng một vấn đề như vậy có thể được giải quyết không?" },
{ id: 243, q: "It must … without delay.", o: ["be done", "have been done", "do", "be doing"], a: "be done", ex: "Bị động với động từ khuyết thiếu: must + be + V3.", vn: "Việc đó phải được thực hiện mà không được trì hoãn." },
{ id: 244, q: "On September 9, 1850, California … to the United States as the thirty-first state.", o: ["has been admitted", "was admitted", "was admitting", "admitted"], a: "was admitted", ex: "Mốc thời gian quá khứ xác định, chia quá khứ đơn bị động.", vn: "Vào ngày 9 tháng 9 năm 1850, California được nhận vào Hoa Kỳ với tư cách là bang thứ 31." },
{ id: 245, q: "When I came, an experiment … in the lab.", o: ["was being holding", "has been held", "was being held", "has held"], a: "was being held", ex: "Hành động đang diễn ra tại một thời điểm trong quá khứ, chia quá khứ tiếp diễn bị động.", vn: "Khi tôi đến, một thí nghiệm đang được tiến hành trong phòng thí nghiệm." },
{ id: 246, q: "I still cannot believe it! My bicycle … some minutes ago.", o: ["was stolen", "was stealing", "stolen", "stole"], a: "was stolen", ex: "Dấu hiệu 'ago' chia quá khứ đơn, xe đạp bị lấy cắp dùng bị động.", vn: "Tôi vẫn không thể tin được! Xe đạp của tôi đã bị trộm cách đây vài phút." },
{ id: 247, q: "The current constitutional problem is … by the top legal minds in the country.", o: ["studying", "being studying", "being studied", "been studied"], a: "being studied", ex: "Vấn đề đang được nghiên cứu, chia hiện tại tiếp diễn bị động.", vn: "Vấn đề hiến pháp hiện tại đang được các chuyên gia pháp lý hàng đầu trong nước nghiên cứu." },
{ id: 248, q: "Something funny … in class yesterday.", o: ["happened", "was happened", "happens", "is happened"], a: "happened", ex: "Động từ 'happen' là nội động từ, không dùng ở dạng bị động.", vn: "Một chuyện buồn cười đã xảy ra trong lớp ngày hôm qua." },
{ id: 249, q: "The child’s arm was swollen because he … by a bee.", o: ["stung", "had stung", "had been stung", "had being stung"], a: "had been stung", ex: "Hành động bị ong đốt xảy ra trước khi tay bị sưng, chia quá khứ hoàn thành bị động.", vn: "Cánh tay của đứa trẻ bị sưng lên vì nó đã bị ong đốt." },
{ id: 250, q: "Today many serious childhood diseases … by early immunization.", o: ["are preventing", "can prevent", "prevent", "can be prevented"], a: "can be prevented", ex: "Căn cứ vào nghĩa: các bệnh có thể được ngăn chặn.", vn: "Ngày nay nhiều bệnh nghiêm trọng ở trẻ em có thể được ngăn chặn bằng việc tiêm chủng sớm." },
{ id: 251, q: "Sally gave such a good speech that I couldn’t resist … loudly when she finished.", o: ["applauding", "being applauded", "to applaud", "to be applauded"], a: "applauding", ex: "Sau resist + V-ing. Căn cứ vào nghĩa: tôi không thể nhịn được việc vỗ tay (chủ động).", vn: "Sally đã có một bài phát biểu hay đến nỗi tôi không thể cưỡng lại việc vỗ tay thật lớn khi cô ấy kết thúc." },
{ id: 252, q: "Not all the necessary things … for our trip that’s why the departure … .", o: ["will have been bought - has been postponed", "have been bought - has been postponed", "has been bought - had been postponed", "had been bought - has been postponed"], a: "have been bought - has been postponed", ex: "Hành động mua đồ chưa xong và việc khởi hành bị hoãn đều kéo dài đến hiện tại.", vn: "Không phải mọi thứ cần thiết đã được mua cho chuyến đi của chúng ta, đó là lý do tại sao việc khởi hành bị hoãn lại." },
{ id: 253, q: "If you want to develop inner tranquility, you have to stop … by every little thing that happens.", o: ["bothering", "being bothered", "to bother", "to be bothered"], a: "being bothered", ex: "Sau stop + V-ing. Căn cứ vào nghĩa: bạn phải ngừng việc bị làm phiền/bị quấy rầy bởi mọi thứ nhỏ nhặt.", vn: "Nếu bạn muốn phát triển sự thanh thản trong tâm hồn, bạn phải ngừng việc bị bận tâm bởi mọi điều nhỏ nhặt xảy ra." },
{ id: 254, q: "Richard really didn’t mind … by the party to celebrate his fortieth birthday.", o: ["surprising", "being surprised", "to surprise", "to be surprised"], a: "being surprised", ex: "Sau mind + V-ing. Richard bị làm cho bất ngờ (bị động).", vn: "Richard thực sự không phiền khi bị gây bất ngờ bởi bữa tiệc mừng sinh nhật lần thứ 40 của mình." },
{ id: 255, q: "Ann hoped … to join the private club.", o: ["inviting", "being invited", "to invite", "to be invited"], a: "to be invited", ex: "Sau hope + To-V. Ann hy vọng được mời (bị động).", vn: "Ann hy vọng được mời tham gia câu lạc bộ tư nhân đó." },
{ id: 256, q: "Are you sure you told me? I don’t recall … about it.", o: ["having told", "having been told", "to have told", "to have been told"], a: "having been told", ex: "Sau recall + V-ing. Việc được kể đã xảy ra rồi nên dùng having been V3 (bị động hoàn thành).", vn: "Bạn có chắc là đã nói với tôi không? Tôi không nhớ là đã được kể về chuyện đó." },
{ id: 257, q: "David appears … some weight. Has he been ill?", o: ["having lost", "having been lost", "to have lost", "to have been lost"], a: "to have lost", ex: "Cấu trúc appear + to-V. Việc giảm cân đã xảy ra (chủ động) nên dùng 'to have lost'.", vn: "David có vẻ như đã bị sụt cân. Anh ấy bị ốm à?" },
{ id: 258, q: "Tom made a serious mistake at work. He’s lucky … a second chance.", o: ["having given", "having been given", "to have given", "to have been given"], a: "to have been given", ex: "Sau lucky + to-V. Tom được cho cơ hội thứ hai (bị động).", vn: "Tom đã phạm sai lầm nghiêm trọng trong công việc. Anh ấy thật may mắn khi được trao cơ hội thứ hai." },
{ id: 259, q: "Dr. Nguyen was very surprised not … the position.", o: ["having offered", "having been offered", "to have offered", "to have been offered"], a: "to have been offered", ex: "Sau surprised + to-V. Bà ấy không được mời vào vị trí đó (bị động).", vn: "Tiến sĩ Nguyễn đã rất ngạc nhiên khi không được mời vào vị trí đó." },
{ id: 260, q: "By the time their baby arrives, the Johnsons hope … painting the new nursery.", o: ["having finished", "having been finished", "to have finished", "to have been finished"], a: "to have finished", ex: "Họ hy vọng sẽ hoàn thành việc sơn (chủ động).", vn: "Đến lúc em bé chào đời, gia đình Johnson hy vọng sẽ hoàn thành việc sơn phòng trẻ." },
{ id: 261, q: "The money … to him two months ago, but it … back yet.", o: ["was lent - had not been given", "has been lent - was not given", "was lent - has not given", "was lent - has not been given"], a: "was lent - has not been given", ex: "Hành động cho mượn xảy ra 2 tháng trước (QK đơn), hành động trả lại kéo dài đến nay (HTHT).", vn: "Số tiền đã được cho anh ta mượn cách đây 2 tháng, nhưng nó vẫn chưa được trả lại." },
{ id: 262, q: "The new students hope … in many of the school’s social activities.", o: ["including", "being included", "to include", "to be included"], a: "to be included", ex: "Học sinh hy vọng được bao gồm/có mặt trong các hoạt động (bị động).", vn: "Các học sinh mới hy vọng được tham gia vào nhiều hoạt động xã hội của trường." },
{ id: 263, q: "The owner doesn’t mind … his customers discounts when they buy in large quantities.", o: ["giving", "being given", "to give", "to be given"], a: "giving", ex: "Chủ cửa hàng không ngại việc đưa ra chiết khấu (chủ động).", vn: "Chủ cửa hàng không ngại giảm giá cho khách hàng khi họ mua với số lượng lớn." },
{ id: 264, q: "Jack got into trouble when he refused … his briefcase for the customs officer.", o: ["opening", "being opened", "to open", "to be opened"], a: "to open", ex: "Sau refuse + to-V. Jack từ chối mở cặp (chủ động).", vn: "Jack gặp rắc rối khi anh ta từ chối mở cặp cho nhân viên hải quan kiểm tra." },
{ id: 265, q: "Fortunately, the hospital’s new air-conditioning system … when the first heat wave arrived.", o: ["had installed", "installed", "had been installed", "had been installing"], a: "had been installed", ex: "Hệ thống đã được lắp đặt trước khi đợt nóng đến (QK hoàn thành bị động).", vn: "May mắn thay, hệ thống điều hòa mới của bệnh viện đã được lắp đặt khi đợt nóng đầu tiên của mùa hè ập đến." },
{ id: 266, q: "The City Parks Department says that many people enjoy … on the trails.", o: ["walking", "being walked", "to walk", "to be walked"], a: "walking", ex: "Sau enjoy + V-ing. Mọi người thích đi bộ (chủ động).", vn: "Sở Công viên Thành phố cho biết rất nhiều người thích đi bộ trên các con đường mòn." },
{ id: 267, q: "You’d better save some money. You can’t count on … by your parents every time.", o: ["rescuing", "being rescued", "to rescue", "to be rescued"], a: "being rescued", ex: "Sau count on + V-ing. Bạn không thể trông chờ vào việc được giải cứu (bị động).", vn: "Tốt hơn là bạn nên tiết kiệm tiền. Bạn không thể cứ trông chờ vào việc được bố mẹ cứu giúp mỗi khi gặp khó khăn tài chính." },
{ id: 268, q: "The man died because medical help was not summoned. A doctor should … immediately.", o: ["have called", "be called", "called", "have been called"], a: "have been called", ex: "Sự việc đã xảy ra trong quá khứ, dùng should have been + V3 để chỉ một việc đáng lẽ nên được làm.", vn: "Người đàn ông đã chết vì không có sự trợ giúp y tế. Đáng lẽ bác sĩ phải được gọi đến ngay lập tức." },
{ id: 269, q: "I don’t remember … of the decision to change the company policy on vacations.", o: ["telling", "being told", "to tell", "to be told"], a: "being told", ex: "Tôi không nhớ là đã được bảo về quyết định đó (bị động).", vn: "Tôi không nhớ là đã được thông báo về quyết định thay đổi chính sách nghỉ lễ của công ty." },
{ id: 270, q: "Ms Clark expects … about any revisions in her manuscript before it is printed.", o: ["consulting", "being consulted", "to consult", "to be consulted"], a: "to be consulted", ex: "Sau expect + to-V. Cô ấy kỳ vọng được tham khảo ý kiến (bị động).", vn: "Cô Clark mong muốn được tham khảo ý kiến về bất kỳ sửa đổi nào trong bản thảo của mình trước khi nó được in." },
{ id: 271, q: "Her fiance is said … from Harvard University five years ago.", o: ["having graduated", "to have graduated", "being graduated", "to be graduated"], a: "to have graduated", ex: "Bị động với động từ chỉ ý kiến. Việc tốt nghiệp xảy ra trước việc 'người ta nói', dùng to have + V3.", vn: "Vị hôn phu của cô ấy được nói là đã tốt nghiệp Đại học Harvard cách đây 5 năm." },
{ id: 272, q: "As a small boy, he used to … alone in the house for an hour or two.", o: ["being left", "leaving", "be left", "leave"], a: "be left", ex: "Cấu trúc used to + V-bare. Cậu bé bị bỏ lại ở nhà một mình (bị động).", vn: "Khi còn là một cậu bé, cậu ấy thường bị để ở nhà một mình trong một hoặc hai tiếng." },
{ id: 273, q: "Ann hoped … to join the private club. She could make important business contact here.", o: ["being invited", "to invite", "to be invited", "inviting"], a: "to be invited", ex: "Sau hope + to-V. Ann hy vọng được mời (bị động).", vn: "Ann hy vọng được mời tham gia câu lạc bộ tư nhân. Cô ấy có thể tạo được các mối quan hệ kinh doanh quan trọng tại đây." },
{ id: 274, q: "Everyone likes … when they have got some success.", o: ["to be congratulated", "being congratulated", "to be congratulating", "to congratulate"], a: "being congratulated", ex: "Sau like + V-ing/To-V. Mọi người thích được chúc mừng (bị động).", vn: "Mọi người đều thích được chúc mừng khi họ gặt hái được một số thành công." },
{ id: 275, q: "Her watch needs … .", o: ["repairing", "to be repaired", "repaired", "A and B"], a: "A and B", ex: "Cấu trúc bị động với need: need + V-ing hoặc need + to be + V3.", vn: "Chiếc đồng hồ của cô ấy cần được sửa." },
{ id: 276, q: "I'll get Minh … this for you.", o: ["do", "done", "did", "to do"], a: "to do", ex: "Cấu trúc nhờ vả chủ động: get + O(người) + to-V.", vn: "Tôi sẽ bảo Minh làm việc này cho bạn." },
{ id: 277, q: "It is suggested that all the strict rules … by employees.", o: ["obey", "are obeyed", "be obeyed", "should obey"], a: "be obeyed", ex: "Cấu trúc giả định với suggest: suggest that + S + (should) be + V3 (bị động).", vn: "Người ta đề nghị rằng tất cả các quy tắc nghiêm ngặt phải được nhân viên tuân thủ." },
{ id: 278, q: "We had the roof of our house … yesterday.", o: ["repaired", "repair", "repairing", "to repair"], a: "repaired", ex: "Cấu trúc nhờ vả bị động: have + O(vật) + V3.", vn: "Hôm qua chúng tôi đã nhờ người sửa mái nhà." },
{ id: 279, q: "The photos … in a London studio last week.", o: ["were taken", "have taken", "was taken", "have been taken"], a: "were taken", ex: "Thời gian quá khứ xác định 'last week', chủ ngữ số nhiều 'photos' dùng bị động QK đơn.", vn: "Những bức ảnh đã được chụp tại một studio ở London vào tuần trước." },
{ id: 280, q: "When the boy … the car he was badly injured.", o: ["is hit by", "was hit by", "hit", "was hitting"], a: "was hit by", ex: "Cậu bé bị xe tông (bị động quá khứ đơn).", vn: "Khi cậu bé bị xe tông, cậu ấy đã bị thương nặng." },
{ id: 281, q: "In Vietnam, it is normally … in the South than in the North.", o: ["hot", "hotter", "hottest", "hoter"], a: "hotter", ex: "Trong câu có 'than' nên ta sử dụng so sánh hơn. 'Hot' là tính từ ngắn nên thêm đuôi -er (gấp đôi phụ âm t).", vn: "Ở Việt Nam, miền Nam thường nóng hơn miền Bắc." },
{ id: 282, q: "The food is … than the last time I ate it.", o: ["badder", "bad", "worse", "worst"], a: "worse", ex: "So sánh hơn của tính từ đặc biệt 'bad' là 'worse'.", vn: "Thức ăn này tệ hơn lần trước tôi ăn." },
{ id: 283, q: "Ho Chi Minh city is … than Hanoi.", o: ["big", "bigger", "biggest", "biger"], a: "bigger", ex: "So sánh hơn với tính từ ngắn 'big' thành 'bigger' (gấp đôi phụ âm g).", vn: "Thành phố Hồ Chí Minh lớn hơn Hà Nội." },
{ id: 284, q: "Her voice is … than her sister’s.", o: ["beautiful", "more beautiful", "beautifully", "more beautifully"], a: "more beautiful", ex: "So sánh hơn với tính từ dài 'beautiful' là 'more beautiful'.", vn: "Giọng hát của cô ấy hay hơn giọng của chị gái cô ấy." },
{ id: 285, q: "Her literature result is much … than it was last year.", o: ["good", "well", "more well", "better"], a: "better", ex: "So sánh hơn của tính từ đặc biệt 'good' là 'better'.", vn: "Kết quả môn văn của cô ấy tốt hơn nhiều so với năm ngoái." },
{ id: 286, q: "Cinderella danced … than any other girls at the ball.", o: ["more graceful", "gracefuler", "gracefully", "more gracefully"], a: "more gracefully", ex: "Dùng trạng từ 'gracefully' để bổ nghĩa cho động từ 'danced', so sánh hơn là 'more gracefully'.", vn: "Lọ Lem đã nhảy uyển chuyển hơn bất kỳ cô gái nào khác tại buổi vũ hội." },
{ id: 287, q: "This book is the … of all.", o: ["bored", "boring", "more boring", "most boring"], a: "most boring", ex: "Cấu trúc 'the + so sánh nhất'. 'Boring' là tính từ dài dùng 'most boring'.", vn: "Cuốn sách này là cuốn chán nhất trong tất cả các cuốn." },
{ id: 288, q: "Mary speaks English very …", o: ["fluent", "fluently", "more fluently", "most fluently"], a: "fluently", ex: "Cần một trạng từ để bổ nghĩa cho động từ 'speak'.", vn: "Mary nói tiếng Anh rất trôi chảy." },
{ id: 289, q: "Tom runs faster than John and David runs the … in the group.", o: ["fast", "most fast", "fastest", "most fastly"], a: "fastest", ex: "So sánh nhất của trạng từ ngắn 'fast' là 'fastest'.", vn: "Tom chạy nhanh hơn John và David chạy nhanh nhất nhóm." },
{ id: 290, q: "There is nothing … than going swimming in hot weather.", o: ["gooder", "good", "better", "best"], a: "better", ex: "So sánh hơn của 'good' là 'better'.", vn: "Không có gì tốt hơn việc đi bơi trong thời tiết nóng bức." },
{ id: 291, q: "Mary is … responsible as Peter.", o: ["more", "the most", "much", "as"], a: "as", ex: "Cấu trúc so sánh bằng: as + adj + as.", vn: "Mary cũng có trách nhiệm như Peter." },
{ id: 292, q: "She is … student in my class.", o: ["most hard-working", "more hard-working", "the most hard-working", "as hard-working"], a: "the most hard-working", ex: "So sánh cô ấy với cả lớp, dùng so sánh nhất 'the most + tính từ dài'.", vn: "Cô ấy là học sinh chăm chỉ nhất trong lớp tôi." },
{ id: 293, q: "He drives … his brother.", o: ["more careful than", "more carefully", "more carefully than", "as careful as"], a: "more carefully than", ex: "Bổ nghĩa cho động từ 'drives' dùng trạng từ 'carefully'. So sánh hơn dùng 'more carefully than'.", vn: "Anh ấy lái xe cẩn thận hơn anh trai mình." },
{ id: 294, q: "Tuan writes more … with fewer mistakes than the previous term.", o: ["careless", "careful", "carefully", "carelessly"], a: "carefully", ex: "Căn cứ vào nghĩa 'ít lỗi hơn' nên phải là viết 'cẩn thận hơn' (carefully).", vn: "Tuấn viết cẩn thận hơn và ít mắc lỗi hơn học kỳ trước." },
{ id: 295, q: "My father is happy because I get … results at school.", o: ["bad", "good", "intelligent", "well"], a: "good", ex: "Cần tính từ bổ nghĩa cho danh từ 'results'. Vì bố vui nên kết quả phải 'tốt' (good).", vn: "Bố tôi vui vì tôi đạt kết quả tốt ở trường." },
{ id: 296, q: "Peter does better at school because he works …", o: ["harder", "more carelessly", "more lazily", "worse"], a: "harder", ex: "Học tốt hơn vì làm việc/học tập chăm chỉ hơn (harder).", vn: "Peter học ở trường tốt hơn vì cậu ấy học tập chăm chỉ hơn." },
{ id: 297, q: "He can do sums more … and read faster.", o: ["badly", "quickly", "difficultly", "fastly"], a: "quickly", ex: "Làm tính nhanh hơn (quickly) tương ứng với đọc nhanh hơn (faster).", vn: "Anh ấy có thể làm toán nhanh hơn và đọc nhanh hơn." },
{ id: 298, q: "Jane is not … her brother.", o: ["more intelligent as", "intelligent as", "so intelligent as", "so intelligent that."], a: "so intelligent as", ex: "So sánh không bằng: not + so/as + adj + as.", vn: "Jane không thông minh bằng anh trai mình." },
{ id: 299, q: "She is a very … pupil. She spends most of her time studying.", o: ["hard-working", "difficult", "hard", "easy"], a: "hard-working", ex: "Dành phần lớn thời gian để học nên là học sinh chăm chỉ (hard-working).", vn: "Cô ấy là một học sinh rất chăm chỉ. Cô ấy dành phần lớn thời gian cho việc học." },
{ id: 300, q: "My English this term is … than that of last year.", o: ["good", "gooder", "better", "best"], a: "better", ex: "Trong câu có 'than', dùng so sánh hơn của 'good' là 'better'.", vn: "Tiếng Anh của tôi học kỳ này tốt hơn năm ngoái." },
{ id: 301, q: "The weather is getting … and … .", o: ["bad / bad", "worse / worse", "badder / badder", "more bad / more bad"], a: "worse / worse", ex: "Cấu trúc so sánh càng... càng (so sánh kép): adj-er and adj-er. 'Bad' chuyển thành 'worse'.", vn: "Thời tiết càng ngày càng trở nên tệ hơn." },
{ id: 302, q: "The more you study, the … you are.", o: ["clever", "cleverer", "cleverest", "the cleverer"], a: "cleverer", ex: "Cấu trúc: The + comparative, the + comparative (càng... thì càng).", vn: "Bạn càng học nhiều, bạn càng thông minh." },
{ id: 303, q: "Of the two sisters, Linda is the … .", o: ["beautiful", "most beautiful", "more beautiful", "as beautiful as"], a: "more beautiful", ex: "Khi so sánh giữa 2 đối tượng (of the two), ta dùng hình thức so sánh hơn kèm mạo từ 'the'.", vn: "Trong hai chị em, Linda là người xinh đẹp hơn." },
{ id: 304, q: "The price of the house is … than we expected.", o: ["far higher", "more higher", "as high", "highest"], a: "far higher", ex: "Dùng 'far' để nhấn mạnh mức độ trong so sánh hơn (cao hơn nhiều).", vn: "Giá của ngôi nhà cao hơn nhiều so với chúng tôi mong đợi." },
{ id: 305, q: "The city is … than the countryside.", o: ["noisier", "more noisy", "noisy", "noisiest"], a: "noisier", ex: "Tính từ 'noisy' kết thúc bằng 'y', khi so sánh hơn đổi thành 'noisier'.", vn: "Thành phố ồn ào hơn nông thôn." },
{ id: 306, q: "This exercise is … than that one.", o: ["easy", "easier", "more easy", "easiest"], a: "easier", ex: "So sánh hơn của tính từ 'easy' là 'easier'.", vn: "Bài tập này dễ hơn bài tập kia." },
{ id: 307, q: "She is the … girl in the class.", o: ["taller", "tallest", "tall", "the tall"], a: "tallest", ex: "So sánh nhất với tính từ ngắn: the + adj-est.", vn: "Cô ấy là cô gái cao nhất trong lớp." },
{ id: 308, q: "This is the … book I have ever read.", o: ["good", "better", "best", "goodest"], a: "best", ex: "So sánh nhất của 'good' là 'best'.", vn: "Đây là cuốn sách hay nhất mà tôi từng đọc." },
{ id: 309, q: "He is … than his brother.", o: ["more intelligent", "intelligent", "most intelligent", "as intelligent"], a: "more intelligent", ex: "So sánh hơn với tính từ dài: more + adj + than.", vn: "Anh ấy thông minh hơn anh trai mình." },
{ id: 310, q: "He works … than any other employees.", o: ["hard", "harder", "hardly", "hardest"], a: "harder", ex: "So sánh hơn của trạng từ 'hard' là 'harder'.", vn: "Anh ấy làm việc chăm chỉ hơn bất kỳ nhân viên nào khác." },
{ id: 311, q: "The test was … than I thought.", o: ["difficult", "more difficult", "most difficult", "as difficult"], a: "more difficult", ex: "So sánh hơn với tính từ dài 'difficult'.", vn: "Bài kiểm tra khó hơn tôi nghĩ." },
{ id: 312, q: "Summer is the … season of the year.", o: ["hot", "hotter", "hottest", "more hot"], a: "hottest", ex: "So sánh nhất với tính từ ngắn 'hot' là 'hottest'.", vn: "Mùa hè là mùa nóng nhất trong năm." },
{ id: 313, q: "Her room is … than mine.", o: ["clean", "cleaner", "cleanest", "more clean"], a: "cleaner", ex: "So sánh hơn tính từ ngắn 'clean'.", vn: "Phòng của cô ấy sạch hơn phòng của tôi." },
{ id: 314, q: "That car is the … in the showroom.", o: ["expensive", "more expensive", "most expensive", "as expensive"], a: "most expensive", ex: "So sánh nhất với tính từ dài: the + most + adj.", vn: "Chiếc xe đó là chiếc đắt nhất trong phòng trưng bày." },
{ id: 315, q: "He is the … man I know.", o: ["rich", "richer", "richest", "more rich"], a: "richest", ex: "So sánh nhất của 'rich' là 'richest'.", vn: "Anh ấy là người đàn ông giàu nhất mà tôi biết." },
{ id: 316, q: "The Nile is the … river in the world.", o: ["long", "longer", "longest", "more long"], a: "longest", ex: "So sánh nhất của 'long' là 'longest'.", vn: "Sông Nile là con sông dài nhất thế giới." },
{ id: 317, q: "This film is … than the one we saw last week.", o: ["boring", "more boring", "most boring", "as boring"], a: "more boring", ex: "So sánh hơn của tính từ dài 'boring'.", vn: "Bộ phim này chán hơn bộ phim chúng ta đã xem tuần trước." },
{ id: 318, q: "Mount Everest is the … mountain in the world.", o: ["high", "higher", "highest", "more high"], a: "highest", ex: "So sánh nhất của 'high' là 'highest'.", vn: "Đỉnh Everest là ngọn núi cao nhất thế giới." },
{ id: 319, q: "She sings … than anyone else in the choir.", o: ["beautiful", "more beautiful", "beautifully", "more beautifully"], a: "more beautifully", ex: "Sử dụng trạng từ so sánh hơn để bổ nghĩa cho động từ 'sings'.", vn: "Cô ấy hát hay hơn bất cứ ai khác trong dàn đồng ca." },
{ id: 320, q: "My car is … than yours.", o: ["fast", "faster", "fastest", "more fast"], a: "faster", ex: "So sánh hơn tính từ ngắn 'fast'.", vn: "Xe của tôi nhanh hơn xe của bạn." },
{ id: 321, q: "He is the … person in his family.", o: ["young", "younger", "youngest", "more young"], a: "youngest", ex: "So sánh nhất tính từ ngắn 'young'.", vn: "Anh ấy là người trẻ nhất trong gia đình." },
{ id: 322, q: "This dress is … than that one.", o: ["pretty", "prettier", "prettiest", "more pretty"], a: "prettier", ex: "So sánh hơn của 'pretty' là 'prettier'.", vn: "Chiếc váy này đẹp hơn chiếc váy kia." },
{ id: 323, q: "January is … than May.", o: ["cold", "colder", "coldest", "more cold"], a: "colder", ex: "So sánh hơn tính từ ngắn 'cold'.", vn: "Tháng Một lạnh hơn tháng Năm." },
{ id: 324, q: "It's the … day of the year.", o: ["short", "shorter", "shortest", "more short"], a: "shortest", ex: "So sánh nhất tính từ ngắn 'short'.", vn: "Đó là ngày ngắn nhất trong năm." },
{ id: 325, q: "Physics is … than Chemistry.", o: ["difficult", "more difficult", "most difficult", "as difficult"], a: "more difficult", ex: "So sánh hơn tính từ dài 'difficult'.", vn: "Vật lý khó hơn Hóa học." },
{ id: 326, q: "This is the … cake I have ever eaten.", o: ["delicious", "more delicious", "most delicious", "as delicious"], a: "most delicious", ex: "So sánh nhất tính từ dài 'delicious'.", vn: "Đây là chiếc bánh ngon nhất mà tôi từng ăn." },
{ id: 327, q: "The more he drinks, the … he becomes.", o: ["violent", "more violent", "violently", "most violent"], a: "more violent", ex: "So sánh kép: The more + S + V, the + comparative + S + V.", vn: "Anh ta càng uống nhiều, anh ta càng trở nên hung hăng." },
{ id: 328, q: "She is not … as her sister.", o: ["so tall", "tall", "taller", "tallest"], a: "so tall", ex: "So sánh không bằng: S + V + not + so/as + adj + as.", vn: "Cô ấy không cao bằng chị mình." },
